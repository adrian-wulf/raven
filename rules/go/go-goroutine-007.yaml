id: go-goroutine-007
name: context.Background in HTTP Handler without Timeout
description: |
  Detects insecure-configuration issues in GO code.
severity: medium
category: insecure-configuration
confidence: medium
cwe: CWE-1088
languages: [go]
message: |
  HTTP handlers should respect request context with timeout, not use context.Background indefinitely.
patterns:
  - type: regex
    pattern: '(?i)context\.Background\s*\(\).*http'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)context\.TODO\s*\(\).*handler'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/1088.html
