id: rust-axum-001
name: Axum Extractor Injection
description: |
  Detects injection issues in RUST code.
severity: high
category: injection
confidence: high
cwe: CWE-74
languages: [rust]
frameworks: [axum]
message: |
  Axum extractors should validate user input before processing.
patterns:
  - type: regex
    pattern: '(?i)Query\s*\(.*user'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)Form\s*\(.*user'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)Json\s*\(.*user'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/74.html
