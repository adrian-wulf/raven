id: java-xxe-007
name: SchemaFactory XXE
description: |
  Detects xxe issues in JAVA code.
severity: critical
category: xxe
confidence: high
cwe: CWE-611
languages: [java]
message: |
  SchemaFactory processing external schemas can lead to XXE.
patterns:
  - type: regex
    pattern: '(?i)SchemaFactory\.newInstance'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)schema\.newValidator\(\).*validate'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)schemaFactory\.setProperty.*external'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/611.html
