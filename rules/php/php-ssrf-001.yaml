id: php-ssrf-001
name: curl with User URL
description: |
  Detects ssrf issues in PHP code.
severity: high
category: ssrf
confidence: high
cwe: CWE-918
languages: [php]
message: |
  curl with user-controlled URLs can access internal services.
patterns:
  - type: regex
    pattern: '(?i)curl_setopt\s*\(.*CURLOPT_URL.*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)curl_init\s*\(\s*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)curl_exec\s*\(.*CURLOPT_URL.*\$'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/918.html
