id: gen-supply-004
name: Package Download Without Verification
severity: high
category: supplychain
confidence: high
cwe: "CWE-494"
languages: [bash, dockerfile]
message: "Downloading and executing code without checksum verification. Verify checksums before execution."
patterns:
