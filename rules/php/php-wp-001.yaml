id: php-wp-001
name: WordPress update_option Injection
description: |
  Detects code-injection issues in PHP code.
severity: high
category: code-injection
confidence: high
cwe: CWE-94
languages: [php]
frameworks: [wordpress]
message: |
  update_option with user input can inject malicious settings.
patterns:
  - type: regex
    pattern: '(?i)update_option\s*\(.*[''"][^''"]+[''"].*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)update_option\s*\(.*[''"][^''"]+[''"].*\$'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/94.html
