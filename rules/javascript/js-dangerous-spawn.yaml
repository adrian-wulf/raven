id: raven-js-spawn-001
name: Node.js spawn with Shell Option
description: |
  Detects child_process.spawn with shell: true which enables command injection.
severity: high
category: command-injection
confidence: high
languages: [javascript, typescript]
message: |
  spawn with shell: true is as dangerous as exec(). Use shell: false with array args.
patterns:
  - type: regex
    pattern: "spawn\\s*\\(\\s*[^)]*shell\\s*:\\s*true"
