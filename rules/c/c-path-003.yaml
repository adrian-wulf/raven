id: c-path-003
name: CreateFile User Path
description: |
  Detects path-traversal issues in C code.
severity: high
category: path-traversal
confidence: high
cwe: CWE-22
languages: [c]
message: |
  CreateFile with user paths can create/modify arbitrary files.
patterns:
  - type: regex
    pattern: '(?i)CreateFile\s*\(\s*.*user'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)CreateFileA\s*\(\s*.*input'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/22.html
