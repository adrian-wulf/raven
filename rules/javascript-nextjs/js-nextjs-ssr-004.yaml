id: js-nextjs-ssr-004
name: ctx.req.url injection
severity: medium
category: injection
confidence: medium
cwe: CWE-20
languages:
- javascript
- typescript
message: Using ctx.req.url without validation can allow request manipulation. Parse and validate URLs.
patterns:
- type: regex
  pattern: ctx\.req\.url\b(?!.*parse)(?!.*validate)
  where: []
references:
- https://cwe.mitre.org/data/definitions/20.html
frameworks:
- nextjs
