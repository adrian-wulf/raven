id: go-http-004
name: HTTP Header Injection via User Input
description: |
  Detects http-header-injection issues in GO code.
severity: high
category: http-header-injection
confidence: high
cwe: CWE-644
languages: [go]
message: |
  Never include user input in HTTP headers without sanitization. Strip newlines.
patterns:
  - type: regex
    pattern: '(?i)w\.Header\(\)\.Set\s*\([^,)]*\+'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)w\.Header\(\)\.Add\s*\([^,)]*r\.'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)http\.NewRequest.*Header\.Set\s*\([^,)]*(r\.|req|param|input|user)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/644.html
