id: sol-access-004
name: UUPS upgrade without auth
severity: critical
category: access-control
confidence: critical
cwe: CWE-284
languages:
- solidity
message: UUPS upgrade function without auth allows anyone to upgrade. Add access control.
patterns:
- type: regex
  pattern: function\s+upgradeTo\s*\(\s*address\s+\w+\s*\)\s*(?!.*onlyOwner)(?!.*auth)
  where: []
references:
- https://cwe.mitre.org/data/definitions/284.html
