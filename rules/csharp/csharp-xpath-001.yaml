id: csharp-xpath-001
name: XPathNavigator Injection
description: |
  Detects xpath-injection issues in CSHARP code.
severity: high
category: xpath-injection
confidence: high
cwe: CWE-643
languages: [csharp]
message: |
  XPathNavigator with user input in expression allows injection.
patterns:
  - type: regex
    pattern: '(?i)XPathNavigator.*Evaluate.*Request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)XPathNavigator.*Select.*Request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)XPathExpression.*Compile.*Request'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/643.html
