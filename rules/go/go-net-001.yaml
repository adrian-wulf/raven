id: go-net-001
name: TCP Server without Connection Timeout
description: |
  Detects insecure-configuration issues in GO code.
severity: medium
category: insecure-configuration
confidence: medium
cwe: CWE-1088
languages: [go]
message: |
  TCP connections without timeouts can be exhausted. Set read/write deadlines.
patterns:
  - type: regex
    pattern: '(?i)net\.Listen\s*\(\s*[`"]tcp'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)listener\.Accept\s*\(\)(?!.*SetDeadline)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/1088.html
