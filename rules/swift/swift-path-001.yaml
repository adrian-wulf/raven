id: swift-path-001
name: FileManager User Path
description: |
  Detects path-traversal issues in SWIFT code.
severity: high
category: path-traversal
confidence: high
cwe: CWE-22
languages: [swift]
message: |
  FileManager with user paths can access arbitrary files.
patterns:
  - type: regex
    pattern: '(?i)FileManager\.default.*contentsOfDirectory\s*\(\s*.*user'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)FileManager\.default.*createFile\s*\(\s*.*input'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/22.html
