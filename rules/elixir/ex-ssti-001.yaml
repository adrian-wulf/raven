id: ex-ssti-001
name: EEx.eval_string
severity: critical
category: ssti
confidence: high
cwe: CWE-1336
languages:
- elixir
message: EEx.eval_string with user input enables Server-Side Template Injection. Avoid evaluating user templates.
patterns:
- type: regex
  pattern: EEx\.eval_string\s*\(\s*(?P<input>user|input|params)
  where:
  - not-constant: true
references:
- https://cwe.mitre.org/data/definitions/1336.html
