id: raven-go-string-001
name: Go String Comparison for Password
description: |
  Detects password verification using == or strings.EqualFold which leaks timing info.
severity: medium
category: cryptography
confidence: medium
languages: [go]
message: |
  String comparison for passwords leaks timing! Use subtle.ConstantTimeCompare().
patterns:
  - type: regex
    pattern: "password\\s*==\\s*"
  - type: regex
    pattern: "strings\\.EqualFold\\s*\\(\\s*[^,]*password"
