id: java-android-001
name: Android WebView loadUrl XSS
description: |
  Detects xss issues in JAVA code.
severity: high
category: xss
confidence: high
cwe: CWE-79
languages: [java]
frameworks: [android]
message: |
  WebView.loadUrl with user-controlled URLs can load malicious content.
patterns:
  - type: regex
    pattern: '(?i)webView\.loadUrl\s*\(.*request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)webView\.loadUrl\s*\(.*getStringExtra'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)webView\.loadUrl\s*\(.*getIntent'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/79.html
