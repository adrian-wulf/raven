id: csharp-xxe-003
name: XDocument.Parse XXE
description: |
  Detects xxe issues in CSHARP code.
severity: critical
category: xxe
confidence: critical
cwe: CWE-611
languages: [csharp]
message: |
  XDocument.Parse processes DTDs by default. Disable DTD processing.
patterns:
  - type: regex
    pattern: '(?i)XDocument\.Parse\s*\(\s*.*Request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)XDocument\.Load\s*\(\s*.*Request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)XDocument\.Parse.*(?!.*DtdProcessing)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/611.html
