id: swift-ios-010
name: TouchID FaceID Result Not Checked
description: |
  Detects weak-cryptography issues in SWIFT code.
severity: high
category: weak-cryptography
confidence: high
cwe: CWE-306
languages: [swift]
frameworks: [ios]
message: |
  Biometric authentication result must be verified.
patterns:
  - type: regex
    pattern: '(?i)evaluatePolicy\s*\(\s*.*\{[^}]*\}\s*\)(?!.*success)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)context\.evaluatePolicy(?!.*result)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/306.html
