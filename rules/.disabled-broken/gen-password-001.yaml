id: gen-password-001
name: Weak Password Hashing Algorithm
severity: critical
category: crypto
confidence: high
cwe: "CWE-916"
languages: [python, javascript, go, java, php, csharp, ruby]
message: "Weak password hashing algorithm detected. Use bcrypt, Argon2id, or scrypt. Never use MD5, SHA1, or SHA256 for passwords."
patterns:
  - type: regex
    pattern: '(md5|sha1|sha256|sha512)\\s*\\(.*password|hashlib\\.md5|hashlib\\.sha1|MessageDigest\\.getInstance\\s*\\(\\s*[\\''"]SHA-?1[\\''"]\\s*\\)'
references:
  - https://cwe.mitre.org/data/definitions/916.html
