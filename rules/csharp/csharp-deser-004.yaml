id: csharp-deser-004
name: Json.NET TypeNameHandling Auto
description: |
  Detects insecure-deserialization issues in CSHARP code.
severity: high
category: insecure-deserialization
confidence: high
cwe: CWE-502
languages: [csharp]
frameworks: [jsonnet]
message: |
  TypeNameHandling.Auto can still deserialize unexpected types.
patterns:
  - type: regex
    pattern: '(?i)TypeNameHandling\s*\.\s*Auto'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)TypeNameHandling\s*=\s*TypeNameHandling\.Auto'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/502.html
