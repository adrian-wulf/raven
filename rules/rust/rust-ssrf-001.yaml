id: rust-ssrf-001
name: reqwest::get User URL
description: |
  Detects ssrf issues in RUST code.
severity: high
category: ssrf
confidence: high
cwe: CWE-918
languages: [rust]
frameworks: [reqwest]
message: |
  reqwest::get with user URLs can access internal services.
patterns:
  - type: regex
    pattern: '(?i)reqwest::get\s*\(.*user'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)reqwest::get\s*\(.*input'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)Client::get\s*\(.*request'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/918.html
