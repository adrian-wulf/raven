id: go-path-003
name: os.Open with User Controlled Path
description: |
  Detects path-traversal issues in GO code.
severity: high
category: path-traversal
confidence: high
cwe: CWE-22
languages: [go]
message: |
  Validate file paths from user input. Use filepath.Clean and restrict to allowed directories.
patterns:
  - type: regex
    pattern: '(?i)os\.Open\s*\(\s*.*(r\.|req|request|param|input|user|filename|path)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)os\.Create\s*\(\s*.*(r\.|req|request|param|input|user|filename|path)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)os\.ReadFile\s*\(\s*.*(r\.|req|request|param|input|user|filename|path)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/22.html
