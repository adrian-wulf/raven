id: c-fmt-002
name: syslog User Format String
description: |
  Detects format-string issues in C code.
severity: high
category: format-string
confidence: high
cwe: CWE-134
languages: [c]
message: |
  syslog with user-controlled format string is vulnerable.
patterns:
  - type: regex
    pattern: '(?i)syslog\s*\(\s*[^,]+,\s*[^''"]+\)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)syslog\s*\(.*%s.*,\s*.*input'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/134.html
