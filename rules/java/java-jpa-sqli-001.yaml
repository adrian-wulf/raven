id: java-jpa-sqli-001
name: JPA createNativeQuery Injection
description: |
  Detects sql-injection issues in JAVA code.
severity: critical
category: sql-injection
confidence: high
cwe: CWE-89
languages: [java]
frameworks: [spring, hibernate]
message: |
  createNativeQuery with concatenated strings is vulnerable to SQL injection.
patterns:
  - type: regex
    pattern: '(?i)createNativeQuery\s*\(\s*[^,)]*\+'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)createNativeQuery\s*\(\s*String\.format'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)createNativeQuery\s*\(\s*.*request\.getParameter'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/89.html
