rule_id: raven-ast-py-subprocess-001
positive:
  - name: subprocess.call with shell=True
    source: |
      subprocess.call('ls ' + user_input, shell=True)
    language: python
    expect_findings: 1
  - name: subprocess.run with shell=True
    source: |
      subprocess.run(cmd, shell=True)
    language: python
    expect_findings: 1
negative:
