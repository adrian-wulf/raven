id: py-fastapi-request-001
name: Request body injection
severity: medium
category: injection
confidence: medium
cwe: CWE-20
languages:
- python
message: Request body parameter without validation can allow injection. Use Pydantic models.
patterns:
- type: regex
  pattern: async\s+def\s+\w+\s*\(\s*\w+\s*:\s*(?P<input>(?!BaseModel)\w+)\s*\)
  where: []
references:
- https://cwe.mitre.org/data/definitions/20.html
frameworks:
- fastapi
