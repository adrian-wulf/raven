id: ruby-file-001
name: File.open User Path
description: |
  Detects path-traversal issues in RUBY code.
severity: high
category: path-traversal
confidence: high
cwe: CWE-22
languages: [ruby]
message: |
  File.open with user paths can read arbitrary files.
patterns:
  - type: regex
    pattern: '(?i)File\.open\s*\(\s*.*params'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)File\.read\s*\(\s*.*params'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)File\.new\s*\(\s*.*params'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/22.html
