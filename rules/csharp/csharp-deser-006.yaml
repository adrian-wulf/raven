id: csharp-deser-006
name: DataContractSerializer without KnownTypes
description: |
  Detects insecure-deserialization issues in CSHARP code.
severity: high
category: insecure-deserialization
confidence: high
cwe: CWE-502
languages: [csharp]
message: |
  DataContractSerializer without KnownTypes restriction is vulnerable.
patterns:
  - type: regex
    pattern: '(?i)new\s+DataContractSerializer\s*\(\s*typeof'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)DataContractSerializer.*ReadObject.*Stream'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/502.html
