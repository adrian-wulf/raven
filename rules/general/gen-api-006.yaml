id: gen-api-006
name: API Returns Stack Trace in Error
severity: high
category: api
confidence: high
cwe: "CWE-200"
languages: [javascript, python, go, java, php, csharp, ruby]
message: "API error response includes stack trace. Return generic error messages in production."
patterns:
  - type: regex
    pattern: "(res\\.json|response\\.json|jsonify|render_json).*error.*stack|error.*stack.*json"
references:
  - https://cwe.mitre.org/data/definitions/200.html
