id: java-misc-010
name: Java SNI Extension Missing
description: |
  Detects weak-cryptography issues in JAVA code.
severity: low
category: weak-cryptography
confidence: low
cwe: CWE-297
languages: [java]
message: |
  Server Name Indication should be enabled for proper certificate validation.
patterns:
  - type: regex
    pattern: '(?i)SSLContext.*getDefault.*(?!SNI)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)SSLSocket.*setEnabledProtocols.*(?!SNI)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/297.html
