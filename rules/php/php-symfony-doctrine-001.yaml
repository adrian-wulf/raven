id: php-symfony-doctrine-001
name: Symfony Doctrine DQL Injection
description: |
  Detects sql-injection issues in PHP code.
severity: critical
category: sql-injection
confidence: high
cwe: CWE-89
languages: [php]
frameworks: [symfony, doctrine]
message: |
  Doctrine DQL with string concatenation is vulnerable to injection.
patterns:
  - type: regex
    pattern: '(?i)createQuery\s*\(.*[''"].*SELECT.*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)createQuery\s*\(.*[''"].*WHERE.*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)getEntityManager.*createQuery.*\$'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/89.html
