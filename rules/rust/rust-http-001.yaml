id: rust-http-001
name: axum serve without TLS
description: |
  Detects insecure-configuration issues in RUST code.
severity: medium
category: insecure-configuration
confidence: medium
cwe: CWE-319
languages: [rust]
frameworks: [axum]
message: |
  Serving without TLS exposes data in transit.
patterns:
  - type: regex
    pattern: '(?i)axum::Server::bind.*serve(?!.*tls)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)TcpListener::bind.*axum(?!.*tls)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/319.html
