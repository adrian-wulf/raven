id: java-sqli-003
name: JDBC Statement executeQuery Concat
description: |
  Detects sql-injection issues in JAVA code.
severity: critical
category: sql-injection
confidence: high
cwe: CWE-89
languages: [java]
message: |
  Statement with string concatenation is vulnerable to SQL injection. Use PreparedStatement.
patterns:
  - type: regex
    pattern: '(?i)Statement.*executeQuery\s*\(\s*[`"][^`"]*\+'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)stmt\.execute\s*\(\s*[`"][^`"]*\+'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)createStatement\s*\(\).*executeQuery.*\+'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/89.html
