id: raven-java-spring-001
name: Spring Boot @Entity Exposure
description: |
  Detects returning JPA @Entity directly from REST endpoints which can expose internal fields.
severity: low
category: info-disclosure
confidence: low
cwe: CWE-200
languages: [java]
message: |
  Returning @Entity directly exposes all fields including internal ones. Use DTOs.
patterns:
  - type: regex
    pattern: "@(?:GetMapping|PostMapping|RequestMapping)"
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/200.html
