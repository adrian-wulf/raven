id: rust-ssrf-002
name: hyper::Client User URL
description: |
  Detects ssrf issues in RUST code.
severity: high
category: ssrf
confidence: high
cwe: CWE-918
languages: [rust]
frameworks: [hyper]
message: |
  hyper::Client with user URLs enables SSRF.
patterns:
  - type: regex
    pattern: '(?i)hyper::Client.*get\s*\(.*user'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)hyper::Client.*request\s*\(.*input'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/918.html
