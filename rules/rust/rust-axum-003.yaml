id: rust-axum-003
name: Axum Handler User Input
description: |
  Detects injection issues in RUST code.
severity: high
category: injection
confidence: high
cwe: CWE-74
languages: [rust]
frameworks: [axum]
message: |
  Handlers receiving user input must validate it.
patterns:
  - type: regex
    pattern: '(?i)async\s+fn\s+\w+\s*\(\s*Query'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)async\s+fn\s+\w+\s*\(\s*Json'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/74.html
