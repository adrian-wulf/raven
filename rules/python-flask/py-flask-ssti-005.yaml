id: py-flask-ssti-005
name: from_string with user input
severity: critical
category: ssti
confidence: high
cwe: CWE-1336
languages:
- python
message: Template.from_string() with user input enables SSTI. Avoid compiling user templates.
patterns:
- type: regex
  pattern: from_string\s*\(\s*(?P<input>request\.|user_|f[\"\'])
  where:
  - not-constant: true
references:
- https://cwe.mitre.org/data/definitions/1336.html
frameworks:
- flask
