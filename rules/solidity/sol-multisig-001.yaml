id: sol-multisig-001
name: MultiSig without threshold check
severity: critical
category: access-control
confidence: critical
cwe: CWE-284
languages:
- solidity
message: MultiSig without proper threshold allows unauthorized transactions. Enforce threshold.
patterns:
- type: regex
  pattern: function\s+executeTransaction\s*\([^)]*\)(?!.*require.*confirmations)
  where: []
references:
- https://cwe.mitre.org/data/definitions/284.html
