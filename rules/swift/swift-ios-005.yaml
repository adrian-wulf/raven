id: swift-ios-005
name: URL Scheme without Validation
description: |
  Detects url-redirection issues in SWIFT code.
severity: high
category: url-redirection
confidence: high
cwe: CWE-601
languages: [swift]
frameworks: [ios]
message: |
  Opening URL schemes without validation can redirect to malicious apps.
patterns:
  - type: regex
    pattern: '(?i)UIApplication\.shared\.open\s*\(\s*.*url'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)openURL\s*\(\s*.*[''"].*://'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/601.html
