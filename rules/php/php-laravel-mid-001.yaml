id: php-laravel-mid-001
name: Laravel Middleware Bypass
description: |
  Detects broken-authentication issues in PHP code.
severity: high
category: broken-authentication
confidence: high
cwe: CWE-287
languages: [php]
frameworks: [laravel]
message: |
  Missing middleware on sensitive routes allows unauthorized access.
patterns:
  - type: regex
    pattern: '(?i)Route::(get|post|put|delete)\s*\(.*,.*\)(?!.*middleware)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)Route::group\s*\(.*\[.*\](?!.*middleware)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/287.html
