id: java-authz-001
name: Spring @PreAuthorize Bypass
description: |
  Detects broken-authorization issues in JAVA code.
severity: high
category: broken-authorization
confidence: high
cwe: CWE-285
languages: [java]
frameworks: [spring]
message: |
  @PreAuthorize with user-controlled expressions can bypass authorization.
patterns:
  - type: regex
    pattern: '(?i)@PreAuthorize\s*\(\s*[`"].*request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)@PreAuthorize\s*\(\s*[`"].*hasRole.*\+'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/285.html
