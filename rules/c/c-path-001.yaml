id: c-path-001
name: fopen User Path
description: |
  Detects path-traversal issues in C code.
severity: high
category: path-traversal
confidence: high
cwe: CWE-22
languages: [c]
message: |
  fopen with user paths can read arbitrary files.
patterns:
  - type: regex
    pattern: '(?i)fopen\s*\(\s*.*user'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)fopen\s*\(\s*.*input'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)fopen\s*\(.*[''"].*\\.\\.'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/22.html
