id: php-laravel-mass-001
name: Laravel Mass Assignment fillable Wildcard
description: |
  Detects mass-assignment issues in PHP code.
severity: critical
category: mass-assignment
confidence: critical
cwe: CWE-915
languages: [php]
frameworks: [laravel]
message: |
  fillable with * allows all fields to be mass assigned, including sensitive ones.
patterns:
  - type: regex
    pattern: '(?i)protected\s+\$fillable\s*=\s*\[\s*[''"]\*[''"]\s*\]'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)\$fillable\s*=\s*\[.*\*.*\]'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/915.html
