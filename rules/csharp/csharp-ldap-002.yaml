id: csharp-ldap-002
name: PrincipalSearcher Filter Injection
description: |
  Detects ldap-injection issues in CSHARP code.
severity: critical
category: ldap-injection
confidence: high
cwe: CWE-90
languages: [csharp]
message: |
  PrincipalSearcher with user input allows LDAP injection.
patterns:
  - type: regex
    pattern: '(?i)PrincipalSearcher.*QueryFilter.*Request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)UserPrincipal.*FindByIdentity.*Request'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/90.html
