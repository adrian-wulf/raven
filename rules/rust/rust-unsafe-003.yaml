id: rust-unsafe-003
name: FFI Boundary Unsanitized Input
description: |
  Detects memory-safety issues in RUST code.
severity: high
category: memory-safety
confidence: high
cwe: CWE-20
languages: [rust]
frameworks: [ffi]
message: |
  FFI calls with unsanitized user input can cause undefined behavior.
patterns:
  - type: regex
    pattern: '(?i)extern\s+[''"]C[''"].*fn'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)CString::new\s*\(.*user'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)CString::into_raw'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/20.html
