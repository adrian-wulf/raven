id: swift-ios-007
name: UIPasteboard Sensitive Data
description: |
  Detects information-disclosure issues in SWIFT code.
severity: medium
category: information-disclosure
confidence: medium
cwe: CWE-200
languages: [swift]
frameworks: [ios]
message: |
  Sensitive data in pasteboard can be accessed by other apps.
patterns:
  - type: regex
    pattern: '(?i)UIPasteboard\.general\.string\s*=\s*.*password'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)UIPasteboard\.general\.string\s*=\s*.*secret'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)UIPasteboard.*copy.*sensitive'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/200.html
