id: rust-memory-001
name: Vec::set_len Unsafe
description: |
  Detects memory-safety issues in RUST code.
severity: high
category: memory-safety
confidence: high
cwe: CWE-119
languages: [rust]
message: |
  set_len on Vec without proper initialization is undefined behavior.
patterns:
  - type: regex
    pattern: '(?i)vec\.set_len'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)Vec::set_len'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)set_len\s*\(.*capacity'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/119.html
