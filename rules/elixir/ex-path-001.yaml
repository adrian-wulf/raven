id: ex-path-001
name: File.read!
severity: high
category: path-traversal
confidence: high
cwe: CWE-22
languages:
- elixir
message: File.read! with user-controlled path enables directory traversal. Validate paths.
patterns:
- type: regex
  pattern: File\.read!\s*\(\s*(?P<input>user|input|params)
  where:
  - not-constant: true
references:
- https://cwe.mitre.org/data/definitions/22.html
