id: php-symfony-ssti-003
name: Symfony Twig source Function RCE
description: |
  Detects code-injection issues in PHP code.
severity: critical
category: code-injection
confidence: critical
cwe: CWE-94
languages: [php]
frameworks: [symfony]
message: |
  Twig source() function with user input can read arbitrary files.
patterns:
  - type: regex
    pattern: '(?i)source\s*\(.*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)\{\%\s*include\s*.*\$'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/94.html
