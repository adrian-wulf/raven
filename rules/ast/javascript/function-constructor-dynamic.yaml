id: raven-ast-js-function-ctor-001
name: Function Constructor with Dynamic Input
description: |
  Detects new Function() called with non-literal arguments, which is
  equivalent to eval() and can lead to code injection.
severity: critical
category: code-injection
confidence: high
cwe: CWE-94
languages: [javascript, typescript]
message: |
  new Function() with dynamic input is equivalent to eval().
  Refactor to avoid dynamic code generation entirely.
patterns:
  - type: ast-query
    query: |
      (new_expression
        constructor: (identifier) @fn (#eq? @fn "Function")
        arguments: (arguments (_) @vuln))
    where:
      - not-constant: true
references:
  - https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Function
