id: php-ssrf-004
name: stream_context_create with User URL
description: |
  Detects ssrf issues in PHP code.
severity: high
category: ssrf
confidence: high
cwe: CWE-918
languages: [php]
message: |
  stream_context_create with user URLs enables SSRF.
patterns:
  - type: regex
    pattern: '(?i)stream_context_create\s*\(.*[''"]http.*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)file_get_contents\s*\(.*false.*stream_context_create'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/918.html
