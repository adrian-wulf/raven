id: raven-gen-sql-001
name: SQL Query String Formatting
description: |
  Detects SQL queries built with string formatting, concatenation, or interpolation.
severity: critical
category: sql-injection
confidence: medium
cwe: CWE-89
languages: [javascript, typescript, python, go, php, java, csharp, rust, ruby, swift, kotlin]
message: |
  String formatting in SQL queries is injection! Use parameterized queries.
patterns:
  - type: regex
    pattern: "(SELECT|INSERT|UPDATE|DELETE).*[\"']\\s*\\+\\s*[^\"'\\s]"
    where:
      - not-sanitized:
          - "QUOTE(?)"
  - type: regex
    pattern: "(SELECT|INSERT|UPDATE|DELETE).*\\$\\{"
  - type: regex
    pattern: "(SELECT|INSERT|UPDATE|DELETE).*%s['\"].*(%|\\.format\\s*\\(|\\+)"
    where:
      - not-sanitized:
          - "ON CONFLICT"
          - "QUOTE(?)"
  - type: regex
    pattern: "(SELECT|INSERT|UPDATE|DELETE).*%s['\"].*Sprintf\\s*\\("
  - type: regex
    pattern: "(SELECT|INSERT|UPDATE|DELETE).*f['\"]"
