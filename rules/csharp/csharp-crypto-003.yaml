id: csharp-crypto-003
name: RNGCryptoServiceProvider Weak
description: |
  Detects weak-cryptography issues in CSHARP code.
severity: medium
category: weak-cryptography
confidence: medium
cwe: CWE-338
languages: [csharp]
message: |
  RNGCryptoServiceProvider is deprecated. Use RandomNumberGenerator.
patterns:
  - type: regex
    pattern: '(?i)new\s+RNGCryptoServiceProvider'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)RNGCryptoServiceProvider.*GetBytes'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/338.html
