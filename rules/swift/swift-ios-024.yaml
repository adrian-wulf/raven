id: swift-ios-024
name: SQLite.swift Raw Query
description: |
  Detects sql-injection issues in SWIFT code.
severity: high
category: sql-injection
confidence: high
cwe: CWE-89
languages: [swift]
frameworks: [ios]
message: |
  SQLite.swift with raw queries and user input is vulnerable.
patterns:
  - type: regex
    pattern: '(?i)db\.run\s*\(\s*[''"].*SELECT.*\(\s*\)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)db\.prepare\s*\(\s*[''"].*WHERE.*\(\s*\)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)SQLite\.run\s*\(\s*[''"].*\+'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/89.html
