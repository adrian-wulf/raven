id: c-race-002
name: Signal Handler Async Unsafe
description: |
  Detects race-condition issues in C code.
severity: high
category: race-condition
confidence: high
cwe: CWE-828
languages: [c]
message: |
  Signal handlers calling non-async-signal-safe functions cause deadlocks/corruption.
patterns:
  - type: regex
    pattern: '(?i)signal\s*\(\s*SIG\w+.*malloc'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)signal\s*\(\s*SIG\w+.*printf'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/828.html
