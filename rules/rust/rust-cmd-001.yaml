id: rust-cmd-001
name: std::process::Command arg injection
description: |
  Detects command-injection issues in RUST code.
severity: critical
category: command-injection
confidence: high
cwe: CWE-78
languages: [rust]
message: |
  Command arguments from user input can inject flags.
patterns:
  - type: regex
    pattern: '(?i)Command::new\s*\(.*\).arg\s*\(.*user'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)Command::new\s*\(.*\).args\s*\(.*user'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)std::process::Command.*arg\s*\(.*input'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/78.html
