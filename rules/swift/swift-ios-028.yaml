id: swift-ios-028
name: NSCoding without Secure Coding
description: |
  Detects insecure-deserialization issues in SWIFT code.
severity: high
category: insecure-deserialization
confidence: high
cwe: CWE-502
languages: [swift]
frameworks: [ios]
message: |
  NSCoding without secure coding can instantiate arbitrary classes.
patterns:
  - type: regex
    pattern: '(?i)init\?\s*\(\s*coder'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)NSCoder.*decodeObject(?!.*decodeObjectOfClass)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/502.html
