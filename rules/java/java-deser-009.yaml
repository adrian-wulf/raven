id: java-deser-009
name: Custom readObject Method
description: |
  Detects insecure-deserialization issues in JAVA code.
severity: high
category: insecure-deserialization
confidence: medium
cwe: CWE-502
languages: [java]
message: |
  Custom readObject methods can be exploited. Validate all deserialized data.
patterns:
  - type: regex
    pattern: '(?i)private\s+void\s+readObject\s*\(\s*ObjectInputStream'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)private\s+Object\s+readResolve\s*\(\)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/502.html
