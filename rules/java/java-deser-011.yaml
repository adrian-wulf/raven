id: java-deser-011
name: Kryo Deserialization
description: |
  Detects insecure-deserialization issues in JAVA code.
severity: critical
category: insecure-deserialization
confidence: high
cwe: CWE-502
languages: [java]
frameworks: [kryo]
message: |
  Kryo deserialization without registration allows arbitrary class instantiation.
patterns:
  - type: regex
    pattern: '(?i)new\s+Kryo'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)kryo\.readObject\s*\(.*request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)kryo\.readClassAndObject\s*\(.*request'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/502.html
