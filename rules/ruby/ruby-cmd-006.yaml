id: ruby-cmd-006
name: Ruby Kernel open Pipe
description: |
  Detects command-injection issues in RUBY code.
severity: critical
category: command-injection
confidence: critical
cwe: CWE-78
languages: [ruby]
message: |
  Kernel#open with | prefix executes shell commands.
patterns:
  - type: regex
    pattern: '(?i)open\s*\(\s*[''"]\|'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)Kernel\.open\s*\(\s*[''"]\|.*params'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/78.html
