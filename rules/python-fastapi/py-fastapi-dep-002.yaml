id: py-fastapi-dep-002
name: Callable injection in dependency
severity: high
category: injection
confidence: medium
cwe: CWE-94
languages:
- python
message: Using dynamic callables in FastAPI dependencies can lead to code injection. Validate callables.
patterns:
- type: regex
  pattern: Depends\s*\(\s*(?P<input>lambda|\w+\s*=\s*request\.|eval\()
  where:
  - not-constant: true
references:
- https://cwe.mitre.org/data/definitions/94.html
frameworks:
- fastapi
