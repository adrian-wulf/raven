id: go-sqli-007
name: Upper Database SQL Concat via Sprintf
description: |
  Detects sql-injection issues in GO code.
severity: critical
category: sql-injection
confidence: high
cwe: CWE-89
languages: [go]
message: |
  Never use fmt.Sprintf to build SQL queries. Always use parameterized queries.
patterns:
  - type: regex
    pattern: '(?i)fmt\.Sprintf\s*\(\s*[`"][^`"]*WHERE[^`"]*%s'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)fmt\.Sprintf\s*\(\s*[`"][^`"]*FROM[^`"]*%s'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)fmt\.Sprintf\s*\(\s*[`"][^`"]*SET[^`"]*%s'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/89.html
