id: swift-ios-029
name: Codable Type Confusion
description: |
  Detects insecure-deserialization issues in SWIFT code.
severity: medium
category: insecure-deserialization
confidence: medium
cwe: CWE-502
languages: [swift]
frameworks: [ios]
message: |
  Codable with user-controlled type name can decode wrong types.
patterns:
  - type: regex
    pattern: '(?i)JSONDecoder\s*\(\)\.decode\s*\(.*Type'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)decode\s*\(\s*.*self.*from.*user'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/502.html
