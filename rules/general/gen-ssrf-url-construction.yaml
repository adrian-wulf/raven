id: raven-gen-ssrf-002
name: SSRF via URL Construction
description: |
  Detects HTTP requests built with user-controlled URLs.
severity: high
category: ssrf
confidence: high
cwe: CWE-918
languages: [javascript, typescript, python, go, php, java, csharp, rust, ruby, swift, kotlin]
message: |
  User input in URL enables SSRF. Block internal IPs and validate with allowlist.
patterns:
  - type: regex
    pattern: "(fetch|request|get|post)\\s*\\(\\s*[^)]*(req\\.|request\\.|params\\.|body\\.|query\\.)"
