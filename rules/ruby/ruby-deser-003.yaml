id: ruby-deser-003
name: Marshal.load User Input
description: |
  Detects insecure-deserialization issues in RUBY code.
severity: critical
category: insecure-deserialization
confidence: critical
cwe: CWE-502
languages: [ruby]
message: |
  Marshal.load with untrusted data executes arbitrary code.
patterns:
  - type: regex
    pattern: '(?i)Marshal\.load\s*\(\s*.*params'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)Marshal\.load\s*\(\s*.*request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)Marshal\.restore\s*\(\s*.*params'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/502.html
