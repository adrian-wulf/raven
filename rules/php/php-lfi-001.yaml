id: php-lfi-001
name: include User Path LFI
description: |
  Detects file-inclusion issues in PHP code.
severity: critical
category: file-inclusion
confidence: critical
cwe: CWE-98
languages: [php]
message: |
  Including files from user input allows Local File Inclusion.
patterns:
  - type: regex
    pattern: '(?i)include\s*\(\s*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)include_once\s*\(\s*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)require\s*\(\s*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/98.html
