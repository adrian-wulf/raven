id: java-el-001
name: JSP Expression Language Injection
description: |
  Detects expression-injection issues in JAVA code.
severity: critical
category: expression-injection
confidence: high
cwe: CWE-917
languages: [java]
frameworks: [jsp]
message: |
  User-controlled data in JSP EL expressions can execute arbitrary code.
patterns:
  - type: regex
    pattern: '\$\{.*request\.getParameter'
    where:
      - not-test-file: true
  - type: regex
    pattern: '\$\{.*param\.'
    where:
      - not-test-file: true
  - type: regex
    pattern: '\#\{.*request\.getParameter'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)pageContext.*getExpressionEvaluator'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/917.html
