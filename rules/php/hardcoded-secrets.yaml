id: raven-php-secrets-001
name: Hardcoded Secret in PHP
description: |
  Detects hardcoded API keys, passwords, secrets, and tokens in PHP code.
severity: high
category: secrets
confidence: medium
languages: [php]
message: |
  Hardcoded secret detected. Move to environment variables
  (getenv(), $_ENV) or a secret manager.
patterns:
  - type: regex
    pattern: '(?i)(api[_-]?key|secret[_-]?key|auth[_-]?token|password|private[_-]?key)\s*[:=]\s*["''][^"'']{8,}["'']'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)\$\w+\s*=\s*["''][^"'']*(secret|key|token|password)["''][^"'']{8,}["'']'
    where:
      - not-test-file: true
references:
  - https://owasp.org/www-community/vulnerabilities/Use_of_hard-coded_password
