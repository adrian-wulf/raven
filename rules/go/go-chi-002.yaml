id: go-chi-002
name: Chi Middleware Bypass
description: |
  Detects insecure-configuration issues in GO code.
severity: medium
category: insecure-configuration
confidence: medium
cwe: CWE-284
languages: [go]
frameworks: [chi]
message: |
  Ensure authentication middleware is applied to all routes, not just specific groups.
patterns:
  - type: regex
    pattern: '(?i)r\.Group\s*\([^)]*\).*//.*no auth'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)r\.Route\s*\([^)]*\)\s*without.*middleware'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/284.html
