id: raven-swift-defaults-001
name: Swift UserDefaults with Sensitive Data
description: |
  Detects storing passwords or tokens in UserDefaults which is insecure.
severity: medium
category: secrets
confidence: high
cwe: CWE-798
languages: [swift]
message: |
  UserDefaults is not encrypted! Use Keychain for passwords and tokens.
patterns:
  - type: regex
    pattern: "UserDefaults\\.standard\\.set\\s*\\(\\s*[^,]*(?:password|token|secret|key|auth)"
