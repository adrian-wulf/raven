id: java-spring-cors-002
name: Spring CorsRegistry Allow All
description: |
  Detects cors-misconfiguration issues in JAVA code.
severity: medium
category: cors-misconfiguration
confidence: medium
cwe: CWE-942
languages: [java]
frameworks: [spring]
message: |
  CorsRegistry mapping "/**" with allowedOrigins("*") is insecure.
patterns:
  - type: regex
    pattern: '(?i)registry\.addMapping\s*\(\s*[`"]\/\*\*[`"]\s*\).*allowedOrigins\s*\(\s*[`"]\*[`"]'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)allowedOrigins\s*\(\s*[`"]\*[`"]'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/942.html
