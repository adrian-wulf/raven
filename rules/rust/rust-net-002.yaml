id: rust-net-002
name: rustls Dangerous Server Config
description: |
  Detects weak-cryptography issues in RUST code.
severity: high
category: weak-cryptography
confidence: high
cwe: CWE-295
languages: [rust]
frameworks: [rustls]
message: |
  Dangerous server config bypasses certificate validation.
patterns:
  - type: regex
    pattern: '(?i)DangerousServerConfig'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)AllowAnyAuthenticatedClient'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)AllowAnyAnonymousOrAuthenticated'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/295.html
