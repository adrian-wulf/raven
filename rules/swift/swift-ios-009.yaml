id: swift-ios-009
name: TouchID FaceID without Fallback
description: |
  Detects weak-cryptography issues in SWIFT code.
severity: medium
category: weak-cryptography
confidence: medium
cwe: CWE-306
languages: [swift]
frameworks: [ios]
message: |
  Biometric auth without fallback can lock users out.
patterns:
  - type: regex
    pattern: '(?i)biometry.*(?!.*deviceOwnerAuthentication)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)evaluatePolicy.*(?!.*LAPolicy.*deviceOwner)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/306.html
