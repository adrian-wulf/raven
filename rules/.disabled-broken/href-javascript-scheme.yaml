id: raven-ast-js-href-js-001
name: "href with javascript: Scheme"
description: |
  Detects anchor tags or elements with an href attribute set to a
  javascript: URL, which can lead to XSS.
severity: medium
category: xss
confidence: high
cwe: CWE-79
languages: [javascript, typescript]
message: |
  javascript: URLs in href can execute arbitrary code. Use event handlers
  with proper sanitization, or avoid javascript: schemes entirely.
patterns:
  - type: ast-query
    query: |
      (jsx_attribute
        (property_identifier) @prop (#eq? @prop "href")
        (string) @vuln (#match? @vuln "^\"javascript:"))
references:
  - https://cheatsheetseries.owasp.org/cheatsheets/DOM_based_XSS_Prevention_Cheat_Sheet.html
