id: php-crypto-002
name: sha1 Weak Hash
description: |
  Detects weak-cryptography issues in PHP code.
severity: high
category: weak-cryptography
confidence: high
cwe: CWE-328
languages: [php]
message: |
  sha1 is no longer secure. Use SHA-256 or password_hash().
patterns:
  - type: regex
    pattern: '(?i)sha1\s*\(\s*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)sha1\s*\(\s*\$.*password'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)sha1\s*\(\s*\$.*pass'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/328.html
