id: cpp-concurrency-001
name: std::thread detach without join
description: |
  Detects resource-leak issues in CPP code.
severity: high
category: resource-leak
confidence: high
cwe: CWE-833
languages: [cpp]
message: |
  Detached threads may outlive main(). Use join() or RAII wrappers.
patterns:
  - type: regex
    pattern: '(?i)std::thread.*detach'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)\.detach\s*\(\)(?!.*join)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/833.html
