id: swift-ios-001
name: WKWebView loadHTMLString XSS
description: |
  Detects xss issues in SWIFT code.
severity: high
category: xss
confidence: high
cwe: CWE-79
languages: [swift]
frameworks: [ios]
message: |
  loadHTMLString with user content enables XSS.
patterns:
  - type: regex
    pattern: '(?i)loadHTMLString\s*\(\s*.*user'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)loadHTMLString\s*\(\s*.*request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)webView\.loadHTMLString\s*\(\s*.*params'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/79.html
