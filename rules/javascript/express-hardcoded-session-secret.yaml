id: raven-js-express-secret-001
name: Express Hardcoded Session Secret
description: |
  Detects hardcoded session secrets in Express session middleware.
  Hardcoded secrets can be leaked from source code or version control.
severity: high
category: secrets
confidence: high
cwe: CWE-798
languages: [javascript, typescript]
message: |
  A hardcoded session secret was detected.
  Do not store credentials in source code.
  Use environment variables or a secure vault.
patterns:
  - type: regex
    pattern: "session\\s*\\(\\s*\\{[^}]*secret\\s*:\\s*['\"][^'\"]+['\"]"
  - type: regex
    pattern: "cookieSession\\s*\\(\\s*\\{[^}]*secret\\s*:\\s*['\"][^'\"]+['\"]"
references:
  - https://cheatsheetseries.owasp.org/cheatsheets/Session_Management_Cheat_Sheet.html
