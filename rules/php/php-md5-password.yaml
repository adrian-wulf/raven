id: raven-php-md5-001
name: PHP MD5 for Password Hashing
description: |
  Detects MD5 or SHA1 used for password hashing in PHP.
severity: critical
category: cryptography
confidence: high
cwe: CWE-327
languages: [php]
message: |
  MD5/SHA1 for passwords is broken! Use password_hash() with PASSWORD_ARGON2ID or PASSWORD_BCRYPT.
patterns:
  - type: regex
    pattern: "md5\\s*\\(\\s*.*password"
  - type: regex
    pattern: "sha1\\s*\\(\\s*.*password"
