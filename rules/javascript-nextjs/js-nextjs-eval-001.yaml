id: js-nextjs-eval-001
name: eval in page
severity: critical
category: code-injection
confidence: high
cwe: CWE-94
languages:
- javascript
- typescript
message: eval() in Next.js page/component enables arbitrary code execution. Never use eval.
patterns:
- type: regex
  pattern: eval\s*\(\s*(?P<input>props|data|user|req\.)
  where:
  - not-constant: true
references:
- https://cwe.mitre.org/data/definitions/94.html
frameworks:
- nextjs
