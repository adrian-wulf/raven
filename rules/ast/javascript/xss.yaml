id: raven-ast-js-xss-001
name: XSS via DOM Manipulation
description: |
  Detects XSS vulnerabilities where user input reaches dangerous
  DOM sinks like innerHTML, document.write, or eval.
severity: high
category: xss
confidence: high
cwe: CWE-79
languages: [javascript, typescript]
message: |
  User-controlled input is used to modify the DOM without sanitization.
  Use textContent instead of innerHTML, or sanitize with DOMPurify.
patterns:
  - type: taint
    sources:
      - req.body
      - req.params
      - req.query
      - req.headers
      - window.location
      - document.URL
      - document.cookie
    sinks:
      - .innerHTML
      - .outerHTML
      - document.write
      - document.writeln
      - eval
      - Function
      - setTimeout
      - setInterval
references:
  - https://cheatsheetseries.owasp.org/cheatsheets/Cross_Site_Scripting_Prevention_Cheat_Sheet.html
