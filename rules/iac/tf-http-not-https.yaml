id: raven-iac-tf-009
name: Terraform HTTP Instead of HTTPS
description: |
  Detects load balancers or CloudFront without HTTPS redirect.
severity: medium
category: cryptography
confidence: high
cwe: CWE-327
languages: [terraform]
message: |
  Enforce HTTPS-only access. Redirect HTTP to HTTPS at the load balancer level.
patterns:
  - type: regex
    pattern: "protocol\\s*=\\s*\"HTTP\""
