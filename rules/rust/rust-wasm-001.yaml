id: rust-wasm-001
name: WASM FFI Boundary Unsafe
description: |
  Detects memory-safety issues in RUST code.
severity: high
category: memory-safety
confidence: high
cwe: CWE-825
languages: [rust]
frameworks: [wasm]
message: |
  WASM FFI boundary without validation can cause memory issues.
patterns:
  - type: regex
    pattern: '(?i)wasm_bindgen'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)#\[wasm_bindgen\].*unsafe'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)extern\s+[''"]C[''"].*wasm'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/825.html
