id: raven-py-hash-001
name: Python MD5 for Password Hashing
description: |
  Detects MD5 or SHA1 used for password hashing which is cryptographically broken.
severity: critical
category: cryptography
confidence: high
languages: [python]
message: |
  MD5/SHA1 for passwords is broken! Use bcrypt, argon2, or scrypt.
patterns:
  - type: regex
    pattern: "hashlib\\.md5\\s*\\(.*password"
  - type: regex
    pattern: "hashlib\\.sha1\\s*\\(.*password"
