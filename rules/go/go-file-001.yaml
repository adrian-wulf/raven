id: go-file-001
name: Multipart Form File without Validation
description: |
  Detects file-upload issues in GO code.
severity: high
category: file-upload
confidence: high
cwe: CWE-434
languages: [go]
message: |
  Validate uploaded file types and sizes. Restrict to allowed extensions.
patterns:
  - type: regex
    pattern: '(?i)r\.MultipartForm.*File[^}]*Open.*(?!.*ext)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)multipart\.Form.*File[^}]*(?!.*valid)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/434.html
