id: bash-secret-002
name: Hardcoded API_KEY
severity: critical
category: secrets
confidence: high
cwe: CWE-798
languages:
- bash
- shell
message: Hardcoded API key in shell script is a security risk. Use environment variables.
patterns:
- type: regex
  pattern: API_KEY\s*=\s*[\"\'][^\"\']{8,}[\"\']
  where: []
references:
- https://cwe.mitre.org/data/definitions/798.html
