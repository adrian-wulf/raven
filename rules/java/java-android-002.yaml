id: java-android-002
name: Android WebView JavaScript Bridge
description: |
  Detects insecure-deserialization issues in JAVA code.
severity: critical
category: insecure-deserialization
confidence: critical
cwe: CWE-749
languages: [java]
frameworks: [android]
message: |
  addJavascriptInterface exposes Java objects to JavaScript. Use @JavascriptInterface only.
patterns:
  - type: regex
    pattern: '(?i)webView\.addJavascriptInterface'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)addJavascriptInterface\s*\(\s*new'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)@JavascriptInterface.*public'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/749.html
