id: php-ssrf-002
name: file_get_contents User URL SSRF
description: |
  Detects ssrf issues in PHP code.
severity: high
category: ssrf
confidence: high
cwe: CWE-918
languages: [php]
message: |
  file_get_contents with user URLs enables SSRF.
patterns:
  - type: regex
    pattern: '(?i)file_get_contents\s*\(\s*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)file_get_contents\s*\(.*[''"]http.*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/918.html
