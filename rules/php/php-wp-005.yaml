id: php-wp-005
name: WordPress REST API Auth Bypass
description: |
  Detects broken-authentication issues in PHP code.
severity: high
category: broken-authentication
confidence: high
cwe: CWE-306
languages: [php]
frameworks: [wordpress]
message: |
  Custom REST endpoints without permission checks allow unauthorized access.
patterns:
  - type: regex
    pattern: '(?i)register_rest_route\s*\(.*[''"][^''"]+[''"].*[''"][^''"]+[''"](?!.*permission_callback)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)permission_callback\s*=>\s*[''"]__return_true[''"]'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/306.html
