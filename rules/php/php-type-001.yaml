id: php-type-001
name: Loose Comparison == Type Juggling
description: |
  Detects type-juggling issues in PHP code.
severity: high
category: type-juggling
confidence: high
cwe: CWE-843
languages: [php]
message: |
  == loose comparison is vulnerable to type juggling bypasses. Use ===.
patterns:
  - type: regex
    pattern: '(?i)\$_(GET|POST|REQUEST)\s*==\s*[''"][^''"]+[''"]'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)\$_(GET|POST|REQUEST)\s*==\s*\d+'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)md5\s*\(.*\$.*\)\s*=='
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/843.html
