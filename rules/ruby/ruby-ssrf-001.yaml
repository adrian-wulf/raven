id: ruby-ssrf-001
name: Net::HTTP.get User URL
description: |
  Detects ssrf issues in RUBY code.
severity: high
category: ssrf
confidence: high
cwe: CWE-918
languages: [ruby]
message: |
  Net::HTTP with user URLs can access internal services.
patterns:
  - type: regex
    pattern: '(?i)Net::HTTP\.get\s*\(\s*.*params'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)Net::HTTP\.post\s*\(\s*.*params'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)Net::HTTP\.start\s*\(\s*.*params'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/918.html
