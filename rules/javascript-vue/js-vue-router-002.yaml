  pattern: router\.beforeEach\s*\(\s*\(\s*to\s*,\s*from\s*,\s*next\s*\)\s*=>\s*\{\s*\n\s*next\s*\(\s*\)
  where: []
references:
- https://cwe.mitre.org/data/definitions/287.html
