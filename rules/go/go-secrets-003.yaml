id: go-secrets-003
name: Hardcoded Database Connection String
description: |
  Detects hardcoded-secrets issues in GO code.
severity: critical
category: hardcoded-secrets
confidence: high
cwe: CWE-798
languages: [go]
message: |
  Database connection strings contain credentials. Use environment variables or secret stores.
patterns:
  - type: regex
    pattern: '(?i)[`"].*://[^:]+:[^@]+@.*[`"]'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)connection_string.*:=.*[`"]'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)dsn.*:=.*://'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/798.html
