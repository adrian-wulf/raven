id: ruby-rails-sqli-005
name: Rails order Injection
description: |
  Detects sql-injection issues in RUBY code.
severity: critical
category: sql-injection
confidence: high
cwe: CWE-89
languages: [ruby]
frameworks: [rails]
message: |
  order with user input allows column injection.
patterns:
  - type: regex
    pattern: '(?i)\.order\s*\(\s*params'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)\.order\s*\(\s*[''"].*\#\{'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)\.reorder\s*\(\s*params'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/89.html
