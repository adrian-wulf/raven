id: java-massassign-001
name: Spring @ModelAttribute without @Valid
description: |
  Detects mass-assignment issues in JAVA code.
severity: high
category: mass-assignment
confidence: medium
cwe: CWE-915
languages: [java]
frameworks: [spring]
message: |
  @ModelAttribute without @Valid allows binding of all request parameters to object fields.
patterns:
  - type: regex
    pattern: '(?i)@ModelAttribute.*(?!@Valid)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)@ModelAttribute.*String\s+\w+(?!.*@Valid)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)@ModelAttribute.*(?<!@Valid)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/915.html
