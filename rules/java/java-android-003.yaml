id: java-android-003
name: Android Intent Injection
description: |
  Detects intent-injection issues in JAVA code.
severity: high
category: intent-injection
confidence: high
cwe: CWE-940
languages: [java]
frameworks: [android]
message: |
  Intents from untrusted sources can carry malicious payloads. Validate extras.
patterns:
  - type: regex
    pattern: '(?i)getIntent\(\)\.getStringExtra\s*\(.*request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)getIntent\(\)\.getParcelableExtra'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)startActivity\s*\(.*new\s+Intent\s*\(.*request'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/940.html
