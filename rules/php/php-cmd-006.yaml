id: php-cmd-006
name: popen User Input Command Injection
description: |
  Detects command-injection issues in PHP code.
severity: critical
category: command-injection
confidence: high
cwe: CWE-78
languages: [php]
message: |
  popen() with user input allows command injection.
patterns:
  - type: regex
    pattern: '(?i)popen\s*\(\s*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)popen\s*\(.*[''"].*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/78.html
