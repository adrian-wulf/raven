id: php-redirect-001
name: header Location User URL Open Redirect
description: |
  Detects open-redirect issues in PHP code.
severity: high
category: open-redirect
confidence: high
cwe: CWE-601
languages: [php]
message: |
  header('Location: ' + user) enables open redirect phishing.
patterns:
  - type: regex
    pattern: '(?i)header\s*\(.*[''"]Location:.*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)header\s*\(.*[''"]Location:.*http.*[''"].*\$'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)header\s*\(.*[''"]Location:.*\$'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/601.html
