id: go-debug-001
name: pprof Debug Endpoint Exposed
description: |
  Detects information-disclosure issues in GO code.
severity: high
category: information-disclosure
confidence: high
cwe: CWE-489
languages: [go]
message: |
  pprof endpoints expose sensitive runtime information. Protect or disable in production.
patterns:
  - type: regex
    pattern: '(?i)import\s+_\s+[`"]net/http/pprof[`"]'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)http\.Handle\s*\(\s*[`"]/debug/pprof'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)pprof\.StartCPUProfile'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/489.html
