id: raven-iac-compose-003
name: Docker Compose Secret in Environment
severity: high
category: secrets
confidence: high
languages: [yaml]
message: |
  Secrets in docker-compose environment are visible in process list. Use secrets or .env files.
patterns:
  - type: regex
    pattern: "environment:\\s*\\n\\s*(API_KEY|SECRET|TOKEN|PW|PASSWORD):"
