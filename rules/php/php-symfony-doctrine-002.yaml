id: php-symfony-doctrine-002
name: Symfony Doctrine Native SQL Injection
description: |
  Detects sql-injection issues in PHP code.
severity: critical
category: sql-injection
confidence: high
cwe: CWE-89
languages: [php]
frameworks: [symfony, doctrine]
message: |
  Native SQL queries with user input allow SQL injection.
patterns:
  - type: regex
    pattern: '(?i)getConnection.*executeQuery\s*\(.*[''"].*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)createNativeQuery\s*\(.*[''"].*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/89.html
