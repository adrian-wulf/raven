id: c-bof-005
name: memcpy without Bounds Check
description: |
  Detects buffer-overflow issues in C code.
severity: critical
category: buffer-overflow
confidence: high
cwe: CWE-121
languages: [c]
message: |
  memcpy without size validation can overflow. Ensure dst >= src size.
patterns:
  - type: regex
    pattern: '(?i)memcpy\s*\(\s*[^,]+,\s*[^,]+,\s*[^)]+\)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)memcpy\s*\(.*,\s*.*,\s*strlen'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/121.html
