id: ruby-cmd-002
name: Ruby Backtick Command Injection
description: |
  Detects command-injection issues in RUBY code.
severity: critical
category: command-injection
confidence: critical
cwe: CWE-78
languages: [ruby]
message: |
  Backtick operator with user input is command injection.
patterns:
  - type: regex
    pattern: '(?i)`.*params.*`'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)`.*\#\{.*params.*\}`'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/78.html
