id: php-xxe-002
name: simplexml_load_string XXE
description: |
  Detects xxe issues in PHP code.
severity: critical
category: xxe
confidence: critical
cwe: CWE-611
languages: [php]
message: |
  simplexml_load_string without LIBXML_NONET can process external entities.
patterns:
  - type: regex
    pattern: '(?i)simplexml_load_string\s*\(\s*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)simplexml_load_string\s*\(\s*\$.*xml'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)simplexml_load_string\s*\(\s*\$(?!.*LIBXML_NONET)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/611.html
