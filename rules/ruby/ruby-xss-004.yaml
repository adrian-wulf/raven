id: ruby-xss-004
name: Rails link_to XSS
description: |
  Detects xss issues in RUBY code.
severity: high
category: xss
confidence: high
cwe: CWE-79
languages: [ruby]
frameworks: [rails]
message: |
  link_to with user-controlled href can execute javascript: URLs.
patterns:
  - type: regex
    pattern: '(?i)link_to\s*\(\s*.*params'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)link_to.*href.*params'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)link_to.*javascript:'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/79.html
