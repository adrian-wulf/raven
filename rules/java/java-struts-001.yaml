id: java-struts-001
name: Struts ActionForm Property Injection
description: |
  Detects mass-assignment issues in JAVA code.
severity: high
category: mass-assignment
confidence: medium
cwe: CWE-915
languages: [java]
frameworks: [struts]
message: |
  Struts ActionForm auto-population can set sensitive fields. Use allowlists.
patterns:
  - type: regex
    pattern: '(?i)extends\s+ActionForm'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)DynaActionForm.*request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)BeanUtils\.populate\s*\(.*request'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/915.html
