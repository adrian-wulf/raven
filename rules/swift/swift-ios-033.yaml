id: swift-ios-033
name: CommonCrypto ECB Mode
description: |
  Detects weak-cryptography issues in SWIFT code.
severity: critical
category: weak-cryptography
confidence: critical
cwe: CWE-327
languages: [swift]
frameworks: [ios]
message: |
  ECB mode doesn't provide semantic security. Use GCM.
patterns:
  - type: regex
    pattern: '(?i)kCCOptionECBMode'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)CCCrypt.*kCCOptionECBMode'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)CommonCrypto.*ECB'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/327.html
