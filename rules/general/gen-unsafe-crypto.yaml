id: raven-gen-crypto-001
name: Weak Cryptographic Algorithm
description: |
  Detects use of weak/broken cryptographic algorithms.
severity: high
category: cryptography
confidence: high
cwe: CWE-327
languages: [javascript, typescript, python, go, php, java, csharp, rust, ruby, swift, kotlin]
message: |
  Weak algorithms (MD5, SHA1, DES, RC4) are cryptographically broken. Use SHA-256+/AES-256-GCM.
patterns:
  - type: regex
    pattern: "(?i)\\b(md5|sha1|des|rc4)\\s*\\("
