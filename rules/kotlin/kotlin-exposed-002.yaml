id: kotlin-exposed-002
name: Exposed Query Function Raw
description: |
  Detects sql-injection issues in KOTLIN code.
severity: critical
category: sql-injection
confidence: high
cwe: CWE-89
languages: [kotlin]
frameworks: [exposed]
message: |
  Custom SQL functions with user input can inject.
patterns:
  - type: regex
    pattern: '(?i)SqlExpressionBuilder.*[''"].*\$'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)CustomFunction\s*\(\s*[''"].*\+'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)Op.build\s*\{.*[''"].*\$'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/89.html
