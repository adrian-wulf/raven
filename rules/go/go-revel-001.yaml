id: go-revel-001
name: Revel Parameter Binding Injection
description: |
  Detects injection issues in GO code.
severity: high
category: injection
confidence: medium
cwe: CWE-74
languages: [go]
frameworks: [revel]
message: |
  Validate Revel controller parameters before use in database queries.
patterns:
  - type: regex
    pattern: '(?i)c\.Params\.Get'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)c\.Params\.Bind'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/74.html
