id: java-misc-007
name: Java Debug Wire Protocol Exposure
description: |
  Detects information-disclosure issues in JAVA code.
severity: high
category: information-disclosure
confidence: high
cwe: CWE-200
languages: [java]
message: |
  JDWP allows remote debugging and code execution. Never expose in production.
patterns:
  - type: regex
    pattern: '(?i)-agentlib:jdwp'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)jdwp.*transport.*dt_socket'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)Xdebug.*Xrunjdwp'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/200.html
