id: raven-ruby-erb-001
name: Ruby ERB Template XSS
description: |
  Detects ERB templates rendering user input without HTML escaping.
severity: high
category: xss
confidence: high
cwe: CWE-79
languages: [ruby]
message: |
  ERB.new with user input is XSS! Use HTML escaping or sanitize with a library.
patterns:
  - type: regex
    pattern: "ERB\\.new\\s*\\(\\s*[^)]*params"
