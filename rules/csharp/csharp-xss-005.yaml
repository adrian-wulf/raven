id: csharp-xss-005
name: Control Injection User Data
description: |
  Detects xss issues in CSHARP code.
severity: high
category: xss
confidence: high
cwe: CWE-79
languages: [csharp]
frameworks: [aspnet]
message: |
  Dynamically adding controls with user data can inject scripts.
patterns:
  - type: regex
    pattern: '(?i)Controls\.Add\s*\(\s*.*new\s+.*Label.*Request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)Controls\.Add\s*\(\s*.*new\s+.*Literal.*Request'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/79.html
