id: kotlin-spring-006
name: Spring ResponseEntity without Escape
description: |
  Detects xss issues in KOTLIN code.
severity: high
category: xss
confidence: high
cwe: CWE-79
languages: [kotlin]
frameworks: [spring]
message: |
  ResponseEntity with user content must escape HTML.
patterns:
  - type: regex
    pattern: '(?i)ResponseEntity\.ok\(\).*body\s*\(.*request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)ResponseEntity\.ok\(\).*body\s*\(.*user'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/79.html
