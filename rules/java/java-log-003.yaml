id: java-log-003
name: Logback Pattern with User Data
description: |
  Detects log-injection issues in JAVA code.
severity: medium
category: log-injection
confidence: medium
cwe: CWE-117
languages: [java]
frameworks: [logback]
message: |
  Logback logging user-controlled data can lead to log forging.
patterns:
  - type: regex
    pattern: '(?i)LoggerFactory\.getLogger.*info\s*\(.*request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)LoggerFactory.*debug\s*\(.*request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)ch\.qos\.logback.*%msg.*request'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/117.html
