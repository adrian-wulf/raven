id: go-secrets-004
name: JWT Secret in Source Code
description: |
  Detects hardcoded-secrets issues in GO code.
severity: critical
category: hardcoded-secrets
confidence: high
cwe: CWE-798
languages: [go]
message: |
  JWT secrets in source code can be extracted from binaries. Use environment variables.
patterns:
  - type: regex
    pattern: '(?i)jwtSecret.*:=.*\[\]byte\s*\(\s*[`"][^`"]{8,}'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)jwt\.Parse.*\[\]byte\s*\(\s*[`"][^`"]{8,}'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/798.html
