id: csharp-aspnet-012
name: IFormFile Path Traversal
description: |
  Detects path-traversal issues in CSHARP code.
severity: high
category: path-traversal
confidence: high
cwe: CWE-22
languages: [csharp]
frameworks: [aspnet]
message: |
  IFormFile.FileName can contain path traversal sequences.
patterns:
  - type: regex
    pattern: '(?i)IFormFile.*FileName.*SaveAs'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)IFormFile.*FileName.*Write'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)IFormFile.*FileName.*OpenWrite'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/22.html
