id: php-laravel-mid-002
name: Laravel Auth Middleware Missing on Admin
description: |
  Detects broken-authentication issues in PHP code.
severity: high
category: broken-authentication
confidence: high
cwe: CWE-306
languages: [php]
frameworks: [laravel]
message: |
  Admin routes must have authentication middleware.
patterns:
  - type: regex
    pattern: '(?i)Route::(get|post)\s*\(.*[''/"]/admin'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)Route::(get|post)\s*\(.*[''/"]/dashboard'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/306.html
