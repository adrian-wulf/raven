id: java-file-003
name: FileOutputStream with User Path
description: |
  Detects path-traversal issues in JAVA code.
severity: high
category: path-traversal
confidence: high
cwe: CWE-22
languages: [java]
message: |
  FileOutputStream with user paths can write to arbitrary locations.
patterns:
  - type: regex
    pattern: '(?i)new\s+FileOutputStream\s*\(\s*.*request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)new\s+FileWriter\s*\(\s*.*request'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/22.html
