id: kotlin-android-018
name: Android Screenshot Enabled
description: |
  Detects information-disclosure issues in KOTLIN code.
severity: medium
category: information-disclosure
confidence: medium
cwe: CWE-200
languages: [kotlin]
frameworks: [android]
message: |
  FLAG_SECURE should be set to prevent screenshots.
patterns:
  - type: regex
    pattern: '(?i)FLAG_SECURE(?!.*addFlags)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)getWindow\(\)(?!.*FLAG_SECURE)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/200.html
