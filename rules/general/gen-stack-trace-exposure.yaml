id: raven-gen-stack-001
name: Stack Trace Exposure
description: |
  Detects error handling that may expose stack traces to users.
severity: medium
category: info-disclosure
confidence: medium
cwe: CWE-200
languages: [javascript, typescript, python, go, php, java, csharp, rust, ruby, swift, kotlin]
message: |
  Stack traces leak internal paths and code structure. Return generic errors to users.
patterns:
  - type: regex
    pattern: "(?i)(res|response|ctx|c)\\.(status|send|write|json)\\s*\\(\\s*[^)]*(error|exception|stack).*(message|trace|detail)"
  - type: regex
    pattern: "(?i)return\\s+.*(error|exception|stack).*(message|trace|detail)"
  - type: regex
    pattern: "(?i)(print|console\\.log|logger\\.(error|warn|info))\\s*\\(\\s*[^)]*(error|exception|stack).*(message|trace|detail)"
