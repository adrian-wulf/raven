id: raven-java-xxe-001
name: XML External Entity (XXE) Injection
description: |
  Detects XML parsers configured without disabling external entities,
  which can lead to XXE attacks (file disclosure, SSRF, DoS).
severity: critical
category: xxe
confidence: high
cwe: CWE-611
languages: [java]
message: |
  XXE vulnerability: XML parser allows external entities.
  Disable DTDs and external entities:
  factory.setFeature("http://apache.org/xml/features/disallow-doctype-decl", true);
patterns:
  - type: regex
    pattern: 'DocumentBuilderFactory\.newInstance\s*\(\s*\)'
    where:
      - not-test-file: true
      - not-sanitized:
          - setFeature
          - disallow-doctype-decl
  - type: regex
    pattern: 'SAXParserFactory\.newInstance\s*\(\s*\)'
    where:
      - not-test-file: true
      - not-sanitized:
          - setFeature
          - disallow-doctype-decl
  - type: regex
    pattern: 'XMLReaderFactory\.createXMLReader\s*\(\s*\)'
    where:
      - not-test-file: true
      - not-sanitized:
          - setFeature
          - disallow-doctype-decl
  - type: regex
    pattern: 'TransformerFactory\.newInstance\s*\(\s*\)'
    where:
      - not-test-file: true
      - not-sanitized:
          - setFeature
references:
  - https://owasp.org/www-community/vulnerabilities/XML_External_Entity_(XXE)_Processing
  - https://cheatsheetseries.owasp.org/cheatsheets/XML_External_Entity_Prevention_Cheat_Sheet.html
