rule_id: raven-ast-js-settimeout-001
positive:
  - name: setTimeout with string
    source: |
      setTimeout("alert(1)", 1000);
    language: javascript
    expect_findings: 1
  - name: setInterval with string
    source: |
      setInterval("console.log('tick')", 5000);
    language: javascript
    expect_findings: 1
negative:
  - name: setTimeout with arrow function
    source: |
      setTimeout(() => alert(1), 1000);
    language: javascript
    expect_findings: 0
  - name: setTimeout with function reference
    source: |
      setTimeout(myCallback, 1000);
    language: javascript
    expect_findings: 0
