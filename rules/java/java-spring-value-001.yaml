id: java-spring-value-001
name: Spring @Value Expression Injection
description: |
  Detects expression-injection issues in JAVA code.
severity: high
category: expression-injection
confidence: medium
cwe: CWE-917
languages: [java]
frameworks: [spring]
message: |
  @Value with SpEL expressions from user input can execute arbitrary code.
patterns:
  - type: regex
    pattern: '(?i)@Value\s*\(\s*[$\#]\{.*request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)@Value\s*\(\s*[$\#]\{.*param'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/917.html
