id: java-misc-003
name: Java Native Interface (JNI) Unsafe
description: |
  Detects memory-safety issues in JAVA code.
severity: high
category: memory-safety
confidence: medium
cwe: CWE-111
languages: [java]
message: |
  JNI calls to native code can introduce memory safety issues. Validate inputs.
patterns:
  - type: regex
    pattern: '(?i)System\.loadLibrary'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)native\s+\w+\s*\('
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)JNI.*native.*method'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/111.html
