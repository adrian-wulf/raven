id: kotlin-android-001
name: Android WebView XSS loadUrl
description: |
  Detects xss issues in KOTLIN code.
severity: high
category: xss
confidence: high
cwe: CWE-79
languages: [kotlin]
frameworks: [android]
message: |
  WebView.loadUrl with user data can load malicious content.
patterns:
  - type: regex
    pattern: '(?i)webView\.loadUrl\s*\(\s*.*intent'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)webView\.loadUrl\s*\(\s*.*extra'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)webView\.loadUrl\s*\(\s*.*user'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/79.html
