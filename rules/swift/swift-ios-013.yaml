id: swift-ios-013
name: WKWebView UserContentController
description: |
  Detects xss issues in SWIFT code.
severity: medium
category: xss
confidence: medium
cwe: CWE-79
languages: [swift]
frameworks: [ios]
message: |
  UserContentController without validation can inject scripts.
patterns:
  - type: regex
    pattern: '(?i)addUserScript\s*\(\s*.*user'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)WKUserContentController\s*\(\)(?!.*validate)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/79.html
