id: csharp-ef-001
name: EF FromSqlRaw SQL Injection
description: |
  Detects sql-injection issues in CSHARP code.
severity: critical
category: sql-injection
confidence: critical
cwe: CWE-89
languages: [csharp]
frameworks: [aspnet, ef]
message: |
  FromSqlRaw with user input allows SQL injection. Use FromSqlInterpolated.
patterns:
  - type: regex
    pattern: '(?i)FromSqlRaw\s*\(\s*[''"].*\$'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)FromSqlRaw\s*\(\s*.*\+.*\)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)FromSqlRaw\s*\(\s*.*Request'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/89.html
