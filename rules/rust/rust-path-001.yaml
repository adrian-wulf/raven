id: rust-path-001
name: std::fs::File::open User Path
description: |
  Detects path-traversal issues in RUST code.
severity: high
category: path-traversal
confidence: high
cwe: CWE-22
languages: [rust]
message: |
  File::open with user paths can read arbitrary files.
patterns:
  - type: regex
    pattern: '(?i)File::open\s*\(.*user'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)File::open\s*\(.*input'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)File::create\s*\(.*user'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/22.html
