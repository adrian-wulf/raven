id: raven-py-sqli-001
name: SQL Injection in Python
description: |
  Detects SQL queries built via string formatting, f-strings, or concatenation
  in Python code - the #1 vulnerability in AI-generated Python backends.
severity: critical
category: sql-injection
confidence: high
cwe: CWE-89
languages: [python]
message: |
  SQL injection: Never use f-strings or .format() for SQL queries.
  Use parameterized queries: cursor.execute("SELECT * FROM users WHERE id = %s", (user_id,))
patterns:
  - type: regex
    pattern: '(?i)(cursor\.|db\.|conn\.|connection\.)?(execute|executemany)\s*\(\s*f["''"][^"''"]*\{[^}]+\}'
  - type: regex
    pattern: '(?i)(cursor\.|db\.|conn\.)?(execute|executemany)\s*\(\s*["''"].*\.format\('
  - type: regex
    pattern: '(?i)(SELECT|INSERT|UPDATE|DELETE)\s+.*%\s*\([^)]+\)s'
  - type: regex
    pattern: '(?i)query\s*=\s*["''"].*\+\s*(request|req|params|body|form|args)'
  - type: regex
    pattern: '(?i)query\s*=\s*f["''"][^"''"]*\{[^}]+\}'
references:
  - https://docs.python.org/3/library/sqlite3.html#sqlite3-placeholders
