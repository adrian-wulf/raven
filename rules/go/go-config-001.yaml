id: go-config-001
name: Hardcoded API Key or Token
description: |
  Detects hardcoded-secrets issues in GO code.
severity: critical
category: hardcoded-secrets
confidence: high
cwe: CWE-798
languages: [go]
message: |
  API keys in source code are exposed in compiled binaries. Use environment variables.
patterns:
  - type: regex
    pattern: '(?i)(?<!//.*)(api[_-]?key|apikey|token|secret|password|passwd).*:=.*[`"][^`"]{8,}[`"]'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)(?<!//.*)(auth|bearer).*:=.*[`"][^`"]{10,}[`"]'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/798.html
