id: py-django-xss-004
name: JsonResponse without escaping
severity: medium
category: xss
confidence: medium
cwe: CWE-79
languages:
- python
message: JsonResponse without proper escaping can lead to XSS via JSON injection. Ensure json_script filter in templates.
patterns:
- type: regex
  pattern: JsonResponse\s*\(\s*\{.*:\s*(?P<input>request\.|user_)
  where:
  - not-constant: true
references:
- https://cwe.mitre.org/data/definitions/79.html
frameworks:
- django
