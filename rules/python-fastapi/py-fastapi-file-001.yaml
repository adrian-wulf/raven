id: py-fastapi-file-001
name: UploadFile path traversal
severity: high
category: path-traversal
confidence: high
cwe: CWE-22
languages:
- python
message: UploadFile filename used without validation can allow path traversal. Validate filename.
patterns:
- type: regex
  pattern: UploadFile.*filename.*open\s*\(\s*(?P<input>file\.filename|\w+\.filename)
  where:
  - not-constant: true
references:
- https://cwe.mitre.org/data/definitions/22.html
frameworks:
- fastapi
