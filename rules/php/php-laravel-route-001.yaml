id: php-laravel-route-001
name: Laravel Route Parameter Injection
description: |
  Detects injection issues in PHP code.
severity: high
category: injection
confidence: high
cwe: CWE-74
languages: [php]
frameworks: [laravel]
message: |
  Route parameters should be validated before use.
patterns:
  - type: regex
    pattern: '(?i)Route::(get|post)\s*\(.*\{.*\}.*->.*\$'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)function\s*\(\s*\$\w+\s*\).*DB::'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/74.html
