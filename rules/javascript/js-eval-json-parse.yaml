id: raven-js-eval-json-001
name: eval Used for JSON Parsing
description: |
  Detects eval() or new Function() used to parse JSON instead of JSON.parse().
severity: critical
category: code-injection
confidence: high
cwe: CWE-94
languages: [javascript, typescript]
message: |
  Never use eval() for JSON! Use JSON.parse() which is safe and much faster.
patterns:
  - type: regex
    pattern: "eval\\s*\\(\\s*[^)]*JSON"
