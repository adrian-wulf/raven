id: php-cmd-003
name: passthru User Input Command Injection
description: |
  Detects command-injection issues in PHP code.
severity: critical
category: command-injection
confidence: critical
cwe: CWE-78
languages: [php]
message: |
  passthru() with user input allows command injection with output.
patterns:
  - type: regex
    pattern: '(?i)passthru\s*\(\s*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)passthru\s*\(.*[''"].*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/78.html
