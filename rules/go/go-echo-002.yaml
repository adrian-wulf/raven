id: go-echo-002
name: Echo Static File Path Traversal
description: |
  Detects path-traversal issues in GO code.
severity: high
category: path-traversal
confidence: high
cwe: CWE-22
languages: [go]
frameworks: [echo]
message: |
  Static file serving can expose arbitrary files if path is user-controlled.
patterns:
  - type: regex
    pattern: '(?i)e\.Static\s*\([^,)]*\s*,\s*.*c\.'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)c\.File\s*\(\s*.*(c\.|param|query|input|user)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/22.html
