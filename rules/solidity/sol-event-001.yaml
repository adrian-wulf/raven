id: sol-event-001
name: Critical function without event
severity: low
category: logging
confidence: low
cwe: CWE-778
languages:
- solidity
message: Important state-changing function without event makes monitoring hard. Emit events.
patterns:
- type: regex
  pattern: function\s+(transfer|mint|burn|withdraw)\w*\s*\([^)]*\)[^{]*\{[^}]*\}(?!.*emit)
  where: []
references:
- https://cwe.mitre.org/data/definitions/778.html
