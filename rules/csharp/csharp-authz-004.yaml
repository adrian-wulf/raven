id: csharp-authz-004
name: Role Check Missing in Code
description: |
  Detects broken-authorization issues in CSHARP code.
severity: medium
category: broken-authorization
confidence: medium
cwe: CWE-306
languages: [csharp]
frameworks: [aspnet]
message: |
  Always verify user roles in sensitive operations.
patterns:
  - type: regex
    pattern: '(?i)User\.IsInRole\s*\(\s*[''"]Admin[''"]\s*\)(?!.*if)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)User\.IsInRole.*(?!.*return)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/306.html
