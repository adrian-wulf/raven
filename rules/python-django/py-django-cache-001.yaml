id: py-django-cache-001
name: Cache poisoning
severity: medium
category: cache
confidence: medium
cwe: CWE-349
languages:
- python
message: Cache key based on user input without validation can enable cache poisoning. Sanitize inputs.
patterns:
- type: regex
  pattern: cache\.set\s*\(\s*(?P<input>request\.|user_)
  where:
  - not-constant: true
references:
- https://cwe.mitre.org/data/definitions/349.html
frameworks:
- django
