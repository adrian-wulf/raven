id: php-upload-002
name: File Upload without MIME Check
description: |
  Detects file-upload issues in PHP code.
severity: high
category: file-upload
confidence: high
cwe: CWE-434
languages: [php]
message: |
  Uploaded files must have MIME type validated against a whitelist.
patterns:
  - type: regex
    pattern: '(?i)move_uploaded_file\s*\(.*\$_(FILES)(?!.*mime)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)\$_(FILES)\[''.*''\]\[''type''\].*without.*check'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/434.html
