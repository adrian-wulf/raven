id: rust-concurrency-004
name: Data Race Pattern Unsafe Cell
description: |
  Detects race-condition issues in RUST code.
severity: high
category: race-condition
confidence: high
cwe: CWE-362
languages: [rust]
message: |
  UnsafeCell without proper synchronization causes data races.
patterns:
  - type: regex
    pattern: '(?i)UnsafeCell::new\s*\('
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)unsafe_cell.*get\s*\('
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)Cell::new\s*\(.*RwLock'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/362.html
