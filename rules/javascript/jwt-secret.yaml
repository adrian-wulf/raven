id: raven-js-jwt-001
name: Hardcoded JWT Secret
description: |
  Detects hardcoded JWT secrets in source code. AI often generates
  example JWT configs with weak or hardcoded secrets.
severity: critical
category: secrets
confidence: high
cwe: CWE-798
languages: [javascript, typescript]
message: |
  Hardcoded JWT secret! Use a strong random secret from environment variables.
  Generate with: require('crypto').randomBytes(64).toString('hex')
patterns:
  - type: regex
    pattern: "(?i)jwtSecret\\s*[:=]\\s*['\"`][^'\"`]{8,}['\"`]"
  - type: regex
    pattern: "(?i)jwt\\.sign\\s*\\(\\s*[^,]+,\\s*['\"`][^'\"`]{8,}['\"`]"
  - type: regex
    pattern: "(?i)secretOrKey\\s*[:=]\\s*['\"`][^'\"`]{8,}['\"`]"
  - type: regex
    pattern: "(?i)secret\\s*[:=]\\s*['\"`]secret['\"`]"
  - type: regex
    pattern: "(?i)secret\\s*[:=]\\s*['\"`]your-secret-key['\"`]"
references:
  - https://auth0.com/blog/a-look-at-the-latest-draft-for-jwt-bcp/
