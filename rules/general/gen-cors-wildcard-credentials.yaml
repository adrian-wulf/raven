id: raven-gen-cors-002
name: CORS Wildcard with Credentials
description: |
  Detects CORS configuration allowing all origins with credentials enabled.
severity: critical
category: cors
confidence: high
languages: [javascript, typescript, python, go, php, java, csharp, rust, ruby, swift, kotlin]
message: |
  CORS * with credentials is a critical vulnerability! Specify exact allowed origins.
patterns:
  - type: regex
    pattern: "Access-Control-Allow-Origin\\s*:\\s*\\*"
  - type: regex
    pattern: "Access-Control-Allow-Credentials\\s*:\\s*true"
