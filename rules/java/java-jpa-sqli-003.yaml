id: java-jpa-sqli-003
name: Hibernate HQL Injection
description: |
  Detects sql-injection issues in JAVA code.
severity: critical
category: sql-injection
confidence: high
cwe: CWE-89
languages: [java]
frameworks: [hibernate]
message: |
  HQL injection can execute arbitrary queries. Use named parameters.
patterns:
  - type: regex
    pattern: '(?i)session\.createQuery\s*\(\s*[`"][^`"]*WHERE[^`"]*\+'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)session\.createQuery\s*\(\s*[`"][^`"]*FROM[^`"]*\+'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)getSession\(\).createQuery.*\+'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/89.html
