id: csharp-crypto-005
name: Weak Certificate Validation
description: |
  Detects weak-cryptography issues in CSHARP code.
severity: critical
category: weak-cryptography
confidence: critical
cwe: CWE-295
languages: [csharp]
message: |
  Custom certificate validation that always returns true is insecure.
patterns:
  - type: regex
    pattern: '(?i)RemoteCertificateValidationCallback.*return\s+true'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)ServerCertificateCustomValidationCallback.*return\s+true'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/295.html
