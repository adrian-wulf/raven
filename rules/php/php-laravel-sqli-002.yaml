id: php-laravel-sqli-002
name: Laravel Eloquent Raw Expression Trust
description: |
  Detects sql-injection issues in PHP code.
severity: critical
category: sql-injection
confidence: high
cwe: CWE-89
languages: [php]
frameworks: [laravel]
message: |
  Raw expressions in Eloquent bypass parameter binding. Never include user input.
patterns:
  - type: regex
    pattern: '(?i)DB::raw\s*\(.*[''"].*\$'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)selectRaw\s*\(.*[''"].*\$'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)havingRaw\s*\(.*[''"].*\$'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/89.html
