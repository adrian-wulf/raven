id: raven-js-console-001
name: Sensitive Data in console.log
description: |
  Detects console.log statements that may leak sensitive data like
  passwords, tokens, or user data to logs.
severity: medium
category: info-disclosure
confidence: medium
languages: [javascript, typescript]
message: |
  console.log may leak sensitive data to logs. Remove or sanitize
  before production. Never log passwords, tokens, or PII.
patterns:
  - type: regex
    pattern: "console\\.log\\s*\\(\\s*[^)]*(password|token|secret|key|auth|credential|credit|ssn)"
  - type: regex
    pattern: "console\\.log\\s*\\(\\s*[^)]*(req\\.|request\\.)\\.(body|headers\\.authorization)"
  - type: regex
    pattern: "console\\.log\\s*\\(\\s*[^)]*JSON\\.stringify\\s*\\(\\s*[^)]*(req\\.|request\\.|user)"
references:
  - https://owasp.org/www-project-top-ten/2017/A3_2017-Sensitive_Data_Exposure
