id: raven-py-requests-001
name: Python Requests SSL Verification Disabled
description: |
  Detects requests calls with verify=False which disables SSL certificate verification.
severity: high
category: misconfiguration
confidence: high
cwe: CWE-16
languages: [python]
message: |
  verify=False disables TLS verification and enables MITM attacks. Never use in production.
patterns:
  - type: regex
    pattern: "verify\\s*=\\s*False"
