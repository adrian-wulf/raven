id: csharp-aspnet-009
name: ASP.NET Min API without Auth
description: |
  Detects broken-authentication issues in CSHARP code.
severity: high
category: broken-authentication
confidence: high
cwe: CWE-306
languages: [csharp]
frameworks: [aspnet]
message: |
  Minimal API endpoints handling sensitive data need authentication.
patterns:
  - type: regex
    pattern: '(?i)app\.MapGet\s*\(.*[''"]/admin'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)app\.MapPost\s*\(.*[''"]/api/delete'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/306.html
