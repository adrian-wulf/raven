id: ruby-rails-secret-001
name: Rails Secret Key Base Exposed
description: |
  Detects hardcoded-secrets issues in RUBY code.
severity: critical
category: hardcoded-secrets
confidence: critical
cwe: CWE-798
languages: [ruby]
frameworks: [rails]
message: |
  Secret key base in source code allows cookie forgery.
patterns:
  - type: regex
    pattern: '(?i)secret_key_base\s*=\s*[''"][^''"]{20,}[''"]'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)SECRET_KEY_BASE\s*=\s*[''"][^''"]+[''"]'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/798.html
