id: kotlin-android-029
name: Android HTTP without HTTPS
description: |
  Detects insecure-communication issues in KOTLIN code.
severity: high
category: insecure-communication
confidence: high
cwe: CWE-319
languages: [kotlin]
frameworks: [android]
message: |
  HTTP URLs transmit data in plaintext. Always use HTTPS.
patterns:
  - type: regex
    pattern: '(?i)URL\s*\(\s*[''"]http://'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)HttpURLConnection(?!.*Https)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/319.html
