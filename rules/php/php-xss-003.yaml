id: php-xss-003
name: print_r User Data Output
description: |
  Detects xss issues in PHP code.
severity: medium
category: xss
confidence: medium
cwe: CWE-79
languages: [php]
message: |
  print_r outputs raw data that may contain XSS payloads.
patterns:
  - type: regex
    pattern: '(?i)print_r\s*\(\s*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)print_r\s*\(\s*\$.*user'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)print_r\s*\(\s*\$.*true\s*\)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/79.html
