id: ruby-rails-ssti-003
name: ERB.new with User Input
description: |
  Detects ssti issues in RUBY code.
severity: critical
category: ssti
confidence: critical
cwe: CWE-1336
languages: [ruby]
frameworks: [rails]
message: |
  ERB.new with user input evaluates arbitrary Ruby code.
patterns:
  - type: regex
    pattern: '(?i)ERB.new\s*\(\s*.*params'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)ERB.new\s*\(\s*.*request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)ERB.new\s*\(\s*.*user'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/1336.html
