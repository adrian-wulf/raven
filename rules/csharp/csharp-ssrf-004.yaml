id: csharp-ssrf-004
name: RestSharp User URL
description: |
  Detects ssrf issues in CSHARP code.
severity: high
category: ssrf
confidence: high
cwe: CWE-918
languages: [csharp]
frameworks: [restsharp]
message: |
  RestSharp with user URLs can make requests to internal services.
patterns:
  - type: regex
    pattern: '(?i)new\s+RestClient\s*\(\s*.*Request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)RestClient.*Execute.*Request'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/918.html
