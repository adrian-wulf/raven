id: rust-panic-002
name: unwrap on User Input
description: |
  Detects denial-of-service issues in RUST code.
severity: high
category: denial-of-service
confidence: high
cwe: CWE-391
languages: [rust]
message: |
  unwrap on user-controlled operations causes DoS. Use match or ?.
patterns:
  - type: regex
    pattern: '(?i)\.unwrap\s*\(\s*\).*user'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)\.unwrap\s*\(\s*\).*input'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)\.unwrap\s*\(\s*\).*request'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/391.html
