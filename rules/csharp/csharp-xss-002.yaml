id: csharp-xss-002
name: innerHtml Assignment User Data
description: |
  Detects xss issues in CSHARP code.
severity: critical
category: xss
confidence: critical
cwe: CWE-79
languages: [csharp]
message: |
  Setting innerHtml with user data executes scripts.
patterns:
  - type: regex
    pattern: '(?i)innerHtml\s*=\s*.*Request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)InnerHtml\s*=\s*.*user'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)innerHTML\s*=\s*.*\$'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/79.html
