id: raven-gen-creds-001
name: Default / Weak Credentials
description: |
  Detects common default credentials and weak passwords that
  AI often generates in example code.
severity: high
category: auth
confidence: medium
cwe: CWE-287
languages: [javascript, typescript, python, go, php, rust, java]
message: |
  Default or weak credentials detected. Use strong, unique passwords
  and store them securely (environment variables, secret managers).
patterns:
  - type: regex
    pattern: "(?i)(admin|root|user)\\s*[:=]\\s*['\"](admin|root|password|123456|qwerty|letmein)['\"]"
  - type: regex
    pattern: "(?i)password\\s*[:=]\\s*['\"](password|123456|qwerty|admin|secret|default)['\"]"
  - type: regex
    pattern: "(?i)default_password"
references:
  - https://owasp.org/www-community/vulnerabilities/Use_of_hard-coded_password
