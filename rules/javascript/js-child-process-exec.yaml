id: raven-js-child-001
name: Node.js child_process.exec with Variables
description: |
  Detects child_process.exec with template literals or variables that may contain user input.
severity: critical
category: command-injection
confidence: high
cwe: CWE-78
languages: [javascript, typescript]
message: |
  child_process.exec with variables is command injection! Use execFile with array args.
patterns:
  - type: regex
    pattern: "exec(?:Sync)?\\s*\\(\\s*`[^`]*\\$\\{[^}]+\\}"
  - type: regex
    pattern: "exec(?:Sync)?\\s*\\(\\s*[^)]*\\+"
