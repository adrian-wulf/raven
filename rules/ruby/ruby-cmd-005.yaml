id: ruby-cmd-005
name: Ruby eval Code Execution
description: |
  Detects code-injection issues in RUBY code.
severity: critical
category: code-injection
confidence: critical
cwe: CWE-94
languages: [ruby]
message: |
  eval() with user input executes arbitrary Ruby code.
patterns:
  - type: regex
    pattern: '(?i)eval\s*\(\s*.*params'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)eval\s*\(\s*.*request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)instance_eval\s*\(\s*.*params'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/94.html
