id: csharp-cmd-001
name: Process.Start User Command
description: |
  Detects command-injection issues in CSHARP code.
severity: critical
category: command-injection
confidence: critical
cwe: CWE-78
languages: [csharp]
message: |
  Process.Start with user input allows arbitrary command execution.
patterns:
  - type: regex
    pattern: '(?i)Process\.Start\s*\(\s*.*Request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)Process\.Start\s*\(\s*.*user'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)new\s+ProcessStartInfo\s*\(\s*.*Request'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/78.html
