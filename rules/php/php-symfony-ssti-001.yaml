id: php-symfony-ssti-001
name: Symfony Twig SSTI
description: |
  Detects ssti issues in PHP code.
severity: critical
category: ssti
confidence: critical
cwe: CWE-1336
languages: [php]
frameworks: [symfony]
message: |
  Twig templates with user input can lead to Server-Side Template Injection.
patterns:
  - type: regex
    pattern: '(?i)Twig\s*::\s*create.*render\s*\(.*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)twig->render\s*\(.*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)\$twig->render\s*\(.*\$'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/1336.html
