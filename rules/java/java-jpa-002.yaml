id: java-jpa-002
name: Hibernate Criteria Delete without Where
description: |
  Detects data-integrity issues in JAVA code.
severity: medium
category: data-integrity
confidence: medium
cwe: CWE-89
languages: [java]
frameworks: [hibernate]
message: |
  Criteria delete without restrictions deletes all records.
patterns:
  - type: regex
    pattern: '(?i)cb\.createCriteriaDelete'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)session\.createQuery\s*\(\s*[`"]delete\s+from[`"]\s*\)(?!.*where)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/89.html
