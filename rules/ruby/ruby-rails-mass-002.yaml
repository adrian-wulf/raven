id: ruby-rails-mass-002
name: Rails Strong Parameters Bypass
description: |
  Detects mass-assignment issues in RUBY code.
severity: high
category: mass-assignment
confidence: high
cwe: CWE-915
languages: [ruby]
frameworks: [rails]
message: |
  permit! allows all parameters through, bypassing strong parameters.
patterns:
  - type: regex
    pattern: '(?i)params\.permit!'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)ActionController::Parameters.new\s*\(\s*params'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)params\.to_unsafe_h'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/915.html
