id: php-cmd-001
name: system User Input Command Injection
description: |
  Detects command-injection issues in PHP code.
severity: critical
category: command-injection
confidence: critical
cwe: CWE-78
languages: [php]
message: |
  system() executing user input allows arbitrary command execution.
patterns:
  - type: regex
    pattern: '(?i)system\s*\(\s*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)system\s*\(.*[''"].*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/78.html
