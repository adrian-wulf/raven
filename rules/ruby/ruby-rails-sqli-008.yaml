id: ruby-rails-sqli-008
name: Rails scope with User Input
description: |
  Detects sql-injection issues in RUBY code.
severity: high
category: sql-injection
confidence: high
cwe: CWE-89
languages: [ruby]
frameworks: [rails]
message: |
  scope with user-controlled input can inject SQL.
patterns:
  - type: regex
    pattern: '(?i)scope\s*:\s*\w+\s*,\s*->.*params'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)scope\s*:\s*\w+\s*,\s*lambda.*params'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/89.html
