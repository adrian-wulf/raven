id: gen-password-006
name: Password Returned in API Response
severity: critical
category: crypto
confidence: high
cwe: "CWE-256"
languages: [javascript, python, go, java, php, csharp, ruby]
message: "Password returned in API response. Never return plaintext passwords in any API response."
patterns:
  - type: regex
    pattern: "(json|response|return|send)\\s*\\(.*password|\\'password\\'"
references:
  - https://cwe.mitre.org/data/definitions/256.html
