id: swift-ios-018
name: Universal Link Bypass
description: |
  Detects url-redirection issues in SWIFT code.
severity: medium
category: url-redirection
confidence: medium
cwe: CWE-601
languages: [swift]
frameworks: [ios]
message: |
  Universal links must validate the associated domain.
patterns:
  - type: regex
    pattern: '(?i)continue\s+userActivity.*webpageURL(?!.*domain)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)NSUserActivity.*webpageURL.*(?!.*validate)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/601.html
