id: csharp-session-001
name: Session Fixation
description: |
  Detects session-fixation issues in CSHARP code.
severity: high
category: session-fixation
confidence: high
cwe: CWE-384
languages: [csharp]
frameworks: [aspnet]
message: |
  Not regenerating session ID after login allows session fixation.
patterns:
  - type: regex
    pattern: '(?i)Session\[''user''\].*=.*(?!.*Regenerate)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)SignInManager.*SignInAsync(?!.*Session)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/384.html
