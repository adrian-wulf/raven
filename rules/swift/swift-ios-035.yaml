id: swift-ios-035
name: UserDefaults Sensitive Data
description: |
  Detects information-disclosure issues in SWIFT code.
severity: medium
category: information-disclosure
confidence: medium
cwe: CWE-312
languages: [swift]
frameworks: [ios]
message: |
  UserDefaults stores data unencrypted. Don't store secrets.
patterns:
  - type: regex
    pattern: '(?i)UserDefaults\.standard\.set\s*\(\s*.*password'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)UserDefaults\.standard\.set\s*\(\s*.*secret'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)UserDefaults.*token'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/312.html
