id: rust-memory-004
name: slice::from_raw_parts
description: |
  Detects memory-safety issues in RUST code.
severity: high
category: memory-safety
confidence: high
cwe: CWE-119
languages: [rust]
message: |
  from_raw_parts with invalid pointer/length causes UB.
patterns:
  - type: regex
    pattern: '(?i)slice::from_raw_parts'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)std::slice::from_raw_parts'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)from_raw_parts\s*\(.*null'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/119.html
