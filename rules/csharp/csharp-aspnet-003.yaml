id: csharp-aspnet-003
name: ASP.NET Razor Url.Content XSS
description: |
  Detects xss issues in CSHARP code.
severity: high
category: xss
confidence: high
cwe: CWE-79
languages: [csharp]
frameworks: [aspnet]
message: |
  Url.Content with user input can inject malicious URLs.
patterns:
  - type: regex
    pattern: '(?i)@Url\.Content\s*\(\s*.*Model'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)@Url\.Content\s*\(\s*.*Request'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/79.html
