id: go-xss-002
name: text/template Used Instead of html/template
description: |
  Detects xss issues in GO code.
severity: high
category: xss
confidence: high
cwe: CWE-79
languages: [go]
message: |
  Use html/template for HTML output to ensure auto-escaping. text/template does not escape HTML.
patterns:
  - type: regex
    pattern: 'import\s+\\(\s*"text/template"'
    where:
      - not-test-file: true
  - type: regex
    pattern: 'template\.Must\(template\.New\(""\)\.Parse\(""\)\)'
    where:
      - not-test-file: true
  - type: regex
    pattern: 'template\.Execute\(.*w.*,.*user.*\)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/79.html
