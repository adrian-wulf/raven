id: java-sqli-005
name: Hibernate SQLQuery Injection
description: |
  Detects sql-injection issues in JAVA code.
severity: critical
category: sql-injection
confidence: high
cwe: CWE-89
languages: [java]
frameworks: [hibernate]
message: |
  SQLQuery with string concatenation allows SQL injection.
patterns:
  - type: regex
    pattern: '(?i)session\.createSQLQuery\s*\(\s*[`"][^`"]*\+'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)createSQLQuery\s*\(\s*String\.format'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)SQLQuery.*setString.*(?<!setParameter)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/89.html
