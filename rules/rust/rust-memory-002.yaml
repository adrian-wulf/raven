id: rust-memory-002
name: String::from_raw_parts
description: |
  Detects memory-safety issues in RUST code.
severity: high
category: memory-safety
confidence: high
cwe: CWE-119
languages: [rust]
message: |
  from_raw_parts with invalid values causes UB. Validate carefully.
patterns:
  - type: regex
    pattern: '(?i)String::from_raw_parts'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)Vec::from_raw_parts'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/119.html
