id: rust-actix-001
name: Actix Extractor Injection
description: |
  Detects injection issues in RUST code.
severity: high
category: injection
confidence: high
cwe: CWE-74
languages: [rust]
frameworks: [actix]
message: |
  Actix extractors should validate extracted data.
patterns:
  - type: regex
    pattern: '(?i)web::Query\s*\(.*user'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)web::Form\s*\(.*user'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)web::Path\s*\(.*user'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/74.html
