id: js-vue-watcher-001
name: Deep watcher on user object
severity: medium
category: config
confidence: medium
cwe: CWE-20
languages:
- javascript
- typescript
message: Deep watcher on large user objects can cause performance issues. Limit watch depth.
patterns:
- type: regex
  pattern: watch\s*:\s*\{\s*\w+\s*:\s*\{[^}]*deep\s*:\s*true
  where: []
references:
- https://cwe.mitre.org/data/definitions/20.html
frameworks:
- vue
