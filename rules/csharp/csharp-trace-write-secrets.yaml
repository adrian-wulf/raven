id: raven-csharp-trace-001
name: C# Trace with Sensitive Data
description: |
  Detects Trace.Write or Debug.Write with passwords or tokens.
severity: medium
category: info-disclosure
confidence: medium
cwe: CWE-200
languages: [csharp]
message: |
  Logging sensitive data can leak secrets. Never log passwords or tokens.
patterns:
  - type: regex
    pattern: "Trace\\.Write(Line)?\\s*\\(\\s*[^)]*(password|token|secret|key|auth)"
