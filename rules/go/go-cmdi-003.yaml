id: go-cmdi-003
name: os/exec Command with User Input
description: |
  Detects command-injection issues in GO code.
severity: critical
category: command-injection
confidence: high
cwe: CWE-78
languages: [go]
message: |
  Never pass user input directly to exec.Command. Validate and sanitize all inputs using allowlists.
patterns:
  - type: regex
    pattern: '(?i)exec\.Command\s*\(\s*[`"][^`"]*%s'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)exec\.Command\s*\(\s*[^,)]*\+\s*'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)exec\.Command\s*\(\s*.*(r\.|req|request|param|input|user)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/78.html
