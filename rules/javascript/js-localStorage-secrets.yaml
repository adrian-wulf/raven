id: raven-js-storage-001
name: localStorage with Sensitive Data
description: |
  Detects storage of tokens or passwords in localStorage which is accessible to XSS.
severity: high
category: secrets
confidence: high
cwe: CWE-798
languages: [javascript, typescript]
message: |
  localStorage is not secure for tokens! Use httpOnly cookies. Accessible to any XSS.
patterns:
  - type: regex
    pattern: "localStorage\\.setItem\\s*\\(\\s*['\"](token|password|secret|key|auth)"
