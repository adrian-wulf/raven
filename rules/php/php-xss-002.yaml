id: php-xss-002
name: print User Data without Escape
description: |
  Detects xss issues in PHP code.
severity: critical
category: xss
confidence: high
cwe: CWE-79
languages: [php]
message: |
  print with user data allows XSS. Always escape output.
patterns:
  - type: regex
    pattern: '(?i)print\s*\(\s*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)print\s*\(.*\$.*user'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)print\s*\(.*\$.*input'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/79.html
