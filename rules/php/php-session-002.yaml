id: php-session-002
name: Session ID in URL
description: |
  Detects session-fixation issues in PHP code.
severity: high
category: session-fixation
confidence: high
cwe: CWE-598
languages: [php]
message: |
  Session IDs in URLs can be leaked through referrer headers and browser history.
patterns:
  - type: regex
    pattern: '(?i)session_use_trans_sid'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)SID.*append.*URL'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)urlencode.*SID'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/598.html
