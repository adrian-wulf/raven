id: swift-ios-031
name: weak Random arc4random
description: |
  Detects weak-cryptography issues in SWIFT code.
severity: high
category: weak-cryptography
confidence: high
cwe: CWE-338
languages: [swift]
frameworks: [ios]
message: |
  arc4random without proper seeding is not cryptographically secure.
patterns:
  - type: regex
    pattern: '(?i)arc4random\s*\(\s*\).*password'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)arc4random\s*\(\s*\).*token'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)arc4random_uniform\s*\(.*secret'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/338.html
