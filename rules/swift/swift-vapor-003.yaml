id: swift-vapor-003
name: Vapor Fluent SQLi
description: |
  Detects sql-injection issues in SWIFT code.
severity: critical
category: sql-injection
confidence: critical
cwe: CWE-89
languages: [swift]
frameworks: [vapor]
message: |
  Fluent raw SQL with user input allows SQL injection.
patterns:
  - type: regex
    pattern: '(?i)db\.query\s*\(\s*[''"].*\$'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)req\.db.*raw\s*\(\s*[''"].*\+'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)DatabaseQuery\.filter\s*\(\s*.*raw'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/89.html
