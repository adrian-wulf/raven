id: dart-secret-001
name: Hardcoded API key
severity: critical
category: secrets
confidence: high
cwe: CWE-798
languages:
- dart
message: Hardcoded API key in source code can be exposed. Use secure storage or environment variables.
patterns:
- type: regex
  pattern: (api[_-]?key|apikey)\s*[:=]\s*[\"\'][^\"\']{16,}[\"\']
  where: []
references:
