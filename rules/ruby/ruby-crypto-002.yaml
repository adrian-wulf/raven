id: ruby-crypto-002
name: Digest::SHA1 Weak Hash
description: |
  Detects weak-cryptography issues in RUBY code.
severity: high
category: weak-cryptography
confidence: high
cwe: CWE-328
languages: [ruby]
message: |
  SHA1 is no longer secure. Use SHA-256 or better.
patterns:
  - type: regex
    pattern: '(?i)Digest::SHA1'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)Digest::SHA\.new\s*\(\s*256'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)OpenSSL::Digest\.new\s*\(\s*[''"]sha1[''"]'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/328.html
