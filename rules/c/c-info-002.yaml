id: c-info-002
name: Stack Trace Print
description: |
  Detects information-disclosure issues in C code.
severity: high
category: information-disclosure
confidence: high
cwe: CWE-497
languages: [c]
message: |
  Printing stack traces exposes internal program structure.
patterns:
  - type: regex
    pattern: '(?i)backtrace\s*\('
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)backtrace_symbols'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)sigaction.*SIGSEGV'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/497.html
