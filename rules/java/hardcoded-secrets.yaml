id: raven-java-secrets-001
name: Hardcoded Secret in Java
description: |
  Detects hardcoded API keys, passwords, secrets, and tokens in Java code.
severity: high
category: secrets
confidence: medium
cwe: CWE-798
languages: [java]
message: |
  Hardcoded secret detected. Move to environment variables,
  Spring properties with encryption, or a secret manager.
patterns:
  - type: regex
    pattern: '(?i)(api[_-]?key|secret[_-]?key|auth[_-]?token|password|private[_-]?key)\s*[:=]\s*["''][^"'']{8,}["'']'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)@Value\s*\(\s*["'']\$\{[^}]*secret[^}]*\}["'']\s*\)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)System\.getenv\s*\(\s*["''][^"'']*(SECRET|KEY|TOKEN|PASSWORD)["'']\s*\)'
    where:
      - not-test-file: true
references:
  - https://owasp.org/www-community/vulnerabilities/Use_of_hard-coded_password
