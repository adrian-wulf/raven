id: gen-password-003
name: Insufficient PBKDF2 Iterations
severity: high
category: crypto
confidence: high
cwe: "CWE-916"
languages: [python, javascript, go, java, csharp]
message: "PBKDF2 iteration count too low. Use at least 100,000 iterations (OWASP recommends 600,000+)."
patterns:
