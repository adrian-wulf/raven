id: go-http-007
name: HTTP Response without Content-Type
description: |
  Detects insecure-configuration issues in GO code.
severity: low
category: insecure-configuration
confidence: low
cwe: CWE-430
languages: [go]
message: |
  Always set Content-Type header. Browser MIME-sniffing can cause XSS.
patterns:
  - type: regex
    pattern: '(?i)w\.Write\s*\(\s*\[\]byte\s*\(\s*[`"]<'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)w\.Write\(\).*//.*no.*Content-Type'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/430.html
