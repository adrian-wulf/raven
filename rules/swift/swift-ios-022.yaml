id: swift-ios-022
name: Core Data NSPredicate Injection
description: |
  Detects sql-injection issues in SWIFT code.
severity: critical
category: sql-injection
confidence: critical
cwe: CWE-89
languages: [swift]
frameworks: [ios]
message: |
  NSPredicate with user input can inject Core Data queries.
patterns:
  - type: regex
    pattern: '(?i)NSPredicate\s*\(\s*format:\s*.*user'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)NSPredicate\s*\(\s*format:\s*.*[''"].*\\(\s*\\)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)predicateWithFormat\s*\(\s*[''"].*\%@[''"].*user'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/89.html
