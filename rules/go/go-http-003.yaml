id: go-http-003
name: http.Client Without Timeout
description: |
  Detects insecure-configuration issues in GO code.
severity: medium
category: insecure-configuration
confidence: medium
cwe: CWE-1088
languages: [go]
message: |
  Always set Timeout on http.Client. Default client has no timeout, causing resource exhaustion.
patterns:
  - type: regex
    pattern: '(?i)http\.DefaultClient'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)&http\.Client\s*\{[^}]*\}(?!.*Timeout)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/1088.html
