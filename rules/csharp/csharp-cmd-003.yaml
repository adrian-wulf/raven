id: csharp-cmd-003
name: cmd.exe /c Command Injection
description: |
  Detects command-injection issues in CSHARP code.
severity: critical
category: command-injection
confidence: critical
cwe: CWE-78
languages: [csharp]
message: |
  Using cmd.exe /c with user input is command injection.
patterns:
  - type: regex
    pattern: '(?i)cmd\.exe.*\/c.*Request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)cmd\.exe.*\/c.*user'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/78.html
