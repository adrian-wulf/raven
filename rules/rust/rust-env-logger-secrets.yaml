id: raven-rust-log-001
name: Rust Logging Sensitive Data
description: |
  Detects log macros with passwords or tokens.
severity: medium
category: info-disclosure
confidence: medium
cwe: CWE-200
languages: [rust]
message: |
  Logging secrets is a security risk. Never log passwords, tokens, or keys.
patterns:
  - type: regex
    pattern: "(log::|tracing::)?(info!|warn!|error!|debug!)\\s*\\(\\s*[^)]*(password|token|secret|key|auth)"
