id: raven-fw-vue-003
name: Vue Router Missing Auth Guard
severity: medium
category: auth
confidence: medium
cwe: CWE-287
languages: [javascript, typescript]
frameworks: [vue]
message: |
  Route without beforeEnter guard may be accessible without authentication.
patterns:
  - type: regex
    pattern: "path:\\s*['\"]/admin"
    where:
      - not-sanitized:
          - beforeEnter
          - meta
