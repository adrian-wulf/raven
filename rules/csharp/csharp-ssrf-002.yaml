id: csharp-ssrf-002
name: WebRequest User URL
description: |
  Detects ssrf issues in CSHARP code.
severity: high
category: ssrf
confidence: high
cwe: CWE-918
languages: [csharp]
message: |
  WebRequest with user-controlled URLs enables SSRF.
patterns:
  - type: regex
    pattern: '(?i)WebRequest\.Create\s*\(\s*.*Request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)HttpWebRequest.*GetResponse.*user'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/918.html
