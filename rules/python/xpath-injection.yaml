id: raven-py-xpath-001
name: XPath Injection in Python
description: |
  Detects XPath queries built with user input via string formatting
  or concatenation, which can allow unauthorized data access.
severity: high
category: xpath-injection
confidence: high
cwe: CWE-74
languages: [python]
message: |
  XPath injection: user input is concatenated into an XPath query.
  Use parameterized XPath or validate input strictly.
patterns:
  - type: regex
    pattern: '(?i)\.xpath\s*\(\s*f["''][^"'']*\{[^}]+\}'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)\.xpath\s*\(\s*["''][^"'']*\+\s*.*(request|req|params|body|form|args|input|data)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)etree\.XPath\s*\([^)]*\+[^)]*\)'
    where:
      - not-test-file: true
references:
  - https://owasp.org/www-community/attacks/XPATH_Injection
