id: js-vue-xss-001
name: v-html with user data
severity: high
category: xss
confidence: high
cwe: CWE-79
languages:
- javascript
- typescript
message: v-html directive renders raw HTML and enables XSS with user data. Use {{ }} interpolation instead.
patterns:
- type: regex
  pattern: v-html\s*=\s*[\"\'][^\"\']*(?P<input>user|data|props|this\.)
  where:
  - not-constant: true
references:
- https://cwe.mitre.org/data/definitions/79.html
frameworks:
- vue
