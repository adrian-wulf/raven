id: gen-cookie-004
name: Sensitive Data in Cookie
severity: high
category: cookie
confidence: high
cwe: "CWE-312"
languages: [javascript, python, go, java, php, csharp, ruby]
message: "Sensitive data stored in cookie. Cookies are stored in plaintext on client. Use server-side sessions."
patterns:
