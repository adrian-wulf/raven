id: php-crypto-001
name: md5 Password Hashing
description: |
  Detects weak-cryptography issues in PHP code.
severity: critical
category: weak-cryptography
confidence: critical
cwe: CWE-916
languages: [php]
message: |
  md5 is cryptographically broken for password hashing. Use password_hash().
patterns:
  - type: regex
    pattern: '(?i)md5\s*\(\s*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)md5\s*\(\s*\$.*password'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)md5\s*\(\s*\$.*pass'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/916.html
