id: php-laravel-redirect-001
name: Laravel redirect()->back() Open Redirect
description: |
  Detects open-redirect issues in PHP code.
severity: high
category: open-redirect
confidence: high
cwe: CWE-601
languages: [php]
frameworks: [laravel]
message: |
  Redirecting to user-controlled URLs enables phishing attacks.
patterns:
  - type: regex
    pattern: '(?i)redirect\s*\(\s*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)return\s+redirect\s*\(\s*\$'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)redirect\s*\(.*[''"]http'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/601.html
