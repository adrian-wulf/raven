id: java-crypto-003
name: Weak KeyGenerator
description: |
  Detects weak-cryptography issues in JAVA code.
severity: high
category: weak-cryptography
confidence: high
cwe: CWE-326
languages: [java]
message: |
  KeyGenerator with weak algorithms produces weak keys. Use AES-256.
patterns:
  - type: regex
    pattern: '(?i)KeyGenerator\.getInstance\s*\(\s*[`"]DES[`"]'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)KeyGenerator\.getInstance\s*\(\s*[`"]Blowfish[`"]'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)KeyPairGenerator.*initialize\s*\(\s*512\s*\)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/326.html
