id: ruby-rails-sqli-006
name: Rails pluck Injection
description: |
  Detects sql-injection issues in RUBY code.
severity: high
category: sql-injection
confidence: high
cwe: CWE-89
languages: [ruby]
frameworks: [rails]
message: |
  pluck with user input can inject column names.
patterns:
  - type: regex
    pattern: '(?i)\.pluck\s*\(\s*params'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)\.pluck\s*\(\s*[''"].*\#\{'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/89.html
