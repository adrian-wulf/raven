id: kotlin-android-013
name: Android SQLite Injection Raw
description: |
  Detects sql-injection issues in KOTLIN code.
severity: critical
category: sql-injection
confidence: high
cwe: CWE-89
languages: [kotlin]
frameworks: [android]
message: |
  Raw SQL queries with user input in SQLiteDatabase are vulnerable.
patterns:
  - type: regex
    pattern: '(?i)rawQuery\s*\(\s*[''"].*\+'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)execSQL\s*\(\s*[''"].*\+'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)SQLiteDatabase.*query.*[''"].*\$'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/89.html
