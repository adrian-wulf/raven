id: c-mem-003
name: Resource Leak File Handle
description: |
  Detects resource-leak issues in C code.
severity: medium
category: resource-leak
confidence: medium
cwe: CWE-404
languages: [c]
message: |
  File handles must be closed. Use fclose or ensure cleanup.
patterns:
  - type: regex
    pattern: '(?i)fopen\s*\(.*\)(?!.*fclose)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)open\s*\(.*\).*return(?!.*close)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/404.html
