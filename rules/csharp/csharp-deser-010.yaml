id: csharp-deser-010
name: LosFormatter Deserialization
description: |
  Detects insecure-deserialization issues in CSHARP code.
severity: critical
category: insecure-deserialization
confidence: critical
cwe: CWE-502
languages: [csharp]
message: |
  LosFormatter is insecure and obsolete. Never use with untrusted data.
patterns:
  - type: regex
    pattern: '(?i)new\s+LosFormatter'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)LosFormatter.*Deserialize'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/502.html
