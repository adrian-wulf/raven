id: raven-rust-secrets-001
name: Hardcoded Secret in Rust
description: |
  Detects hardcoded API keys, passwords, secrets, and tokens in Rust code.
severity: high
category: secrets
confidence: medium
cwe: CWE-798
languages: [rust]
message: |
  Hardcoded secret detected. Move to environment variables
  (std::env::var) or a secret manager.
patterns:
  - type: regex
    pattern: '(?i)(api[_-]?key|secret[_-]?key|auth[_-]?token|password|private[_-]?key)\s*[:=]\s*["''''][^"'''']{8,}["'''']'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)const\s+\w*SECRET\w*\s*[:=]\s*["''''][^"'''']+["'''']'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)static\s+\w*SECRET\w*\s*[:=]\s*["''''][^"'''']+["'''']'
    where:
      - not-test-file: true
references:
  - https://owasp.org/www-community/vulnerabilities/Use_of_hard-coded_password
