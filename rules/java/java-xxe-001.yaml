id: java-xxe-001
name: SAXParser XXE
description: |
  Detects xxe issues in JAVA code.
severity: critical
category: xxe
confidence: high
cwe: CWE-611
languages: [java]
message: |
  SAXParser factory must disable external entities and DTDs to prevent XXE.
patterns:
  - type: regex
    pattern: '(?i)SAXParserFactory\.newInstance'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)SAXParser.*parse\s*\(.*request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)factory\.setFeature\s*\(\s*[`"]http://xml\.org/sax/features/external-general-entities[`"]\s*,\s*true'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/611.html
