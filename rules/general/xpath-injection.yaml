id: raven-gen-xpath-001
name: XPath Injection
description: |
  Detects XPath queries built with user input via string formatting
  or concatenation across multiple languages.
severity: high
category: xpath-injection
confidence: high
cwe: CWE-74
languages: [javascript, typescript, python, go, php, java]
message: |
  XPath injection: user input is concatenated into an XPath query.
  Use parameterized XPath or validate input strictly.
patterns:
  - type: regex
    pattern: '(?i)\.xpath\s*\(\s*[^)]*\+\s*'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)xpath\s*[:=]\s*["''''][^"'''']*\+\s*.*(request|req|params|body|input|data)'
    where:
      - not-test-file: true
references:
  - https://owasp.org/www-community/attacks/XPATH_Injection
