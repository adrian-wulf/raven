id: raven-gen-log-002
name: Sensitive Data in Log Output
description: |
  Detects logging of passwords, tokens, or PII which can leak in logs.
severity: high
category: info-disclosure
confidence: high
cwe: CWE-200
languages: [javascript, typescript, python, go, php, java, csharp, rust, ruby, swift, kotlin]
message: |
  Never log sensitive data! Logs are often shipped to SIEMs and stored indefinitely.
patterns:
  - type: regex
    pattern: "(?i)(log|print|console|fmt\\.Print|logger)\\s*\\(\\s*[^)]*(password|token|secret|ssn|credit|card|api_key|secret_key|private_key)"
  - type: regex
    pattern: "(?i)(log|print|console|fmt\\.Print|logger)\\s*\\(\\s*[^)]*['\"].*(password|token|secret)['\"]"
