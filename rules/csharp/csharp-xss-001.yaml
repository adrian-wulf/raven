id: csharp-xss-001
name: Response.Write User Input
description: |
  Detects xss issues in CSHARP code.
severity: critical
category: xss
confidence: critical
cwe: CWE-79
languages: [csharp]
frameworks: [aspnet]
message: |
  Response.Write with user input enables reflected XSS.
patterns:
  - type: regex
    pattern: '(?i)Response\.Write\s*\(\s*.*Request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)Response\.Write\s*\(\s*.*user'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/79.html
