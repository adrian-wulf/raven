id: raven-gen-auth-002
name: Missing Authentication Check
description: |
  Detects admin/sensitive endpoints without visible authentication checks.
severity: medium
category: auth
confidence: low
cwe: CWE-287
languages: [javascript, typescript, python, go, php, java, csharp, rust, ruby, swift, kotlin]
message: |
  Sensitive endpoint may lack authentication. Add auth middleware or guards.
patterns:
  - type: regex
    pattern: "['\"]/admin"
  - type: regex
    pattern: "['\"]/management"
  - type: regex
    pattern: "['\"]/dashboard"
  - type: regex
    pattern: "['\"]/internal[/\"]"
  - type: regex
    pattern: "path\\s*:\\s*['\"]/admin"
  - type: regex
    pattern: "@app\\.(route|get|post|put|delete|patch)\\s*\\(\\s*['\"]/admin"
  - type: regex
    pattern: "http\\.HandleFunc\\s*\\(\\s*['\"]/admin"
