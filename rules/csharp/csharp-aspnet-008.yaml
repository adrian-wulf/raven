id: csharp-aspnet-008
name: ASP.NET Response Caching Sensitive
description: |
  Detects information-disclosure issues in CSHARP code.
severity: high
category: information-disclosure
confidence: high
cwe: CWE-524
languages: [csharp]
frameworks: [aspnet]
message: |
  Caching sensitive responses can leak data to other users.
patterns:
  - type: regex
    pattern: '(?i)ResponseCache.*Duration.*\[HttpGet\].*password'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)ResponseCache.*Profile.*sensitive'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/524.html
