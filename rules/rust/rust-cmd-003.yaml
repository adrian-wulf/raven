id: rust-cmd-003
name: Command::new with Shell
description: |
  Detects command-injection issues in RUST code.
severity: critical
category: command-injection
confidence: critical
cwe: CWE-78
languages: [rust]
message: |
  Executing /bin/sh -c with user input is command injection.
patterns:
  - type: regex
    pattern: '(?i)Command::new\s*\([''"]/bin/sh[''"]'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)Command::new\s*\([''"]sh[''"]\s*\).arg\s*\([''"]-c[''"]'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/78.html
