id: go-deser-006
name: proto.Unmarshal without Validation
description: |
  Detects insecure-deserialization issues in GO code.
severity: medium
category: insecure-deserialization
confidence: medium
cwe: CWE-502
languages: [go]
frameworks: [protobuf]
message: |
  Always validate protobuf messages after unmarshaling. Check required fields.
patterns:
  - type: regex
    pattern: '(?i)proto\.Unmarshal\s*\([^,]*,\s*.*&'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)protojson\.Unmarshal\s*\('
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/502.html
