id: csharp-file-002
name: Path.Combine Traversal
description: |
  Detects path-traversal issues in CSHARP code.
severity: high
category: path-traversal
confidence: high
cwe: CWE-22
languages: [csharp]
message: |
  Path.Combine doesn't prevent traversal. Validate final path.
patterns:
  - type: regex
    pattern: '(?i)Path\.Combine\s*\(.*IFormFile.*FileName'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)Path\.Combine\s*\(.*user.*filename'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/22.html
