id: java-xxe-002
name: SAXParser Without Secure Processing
description: |
  Detects xxe issues in JAVA code.
severity: high
category: xxe
confidence: medium
cwe: CWE-611
languages: [java]
message: |
  Always set secure processing features on SAXParserFactory.
patterns:
  - type: regex
    pattern: '(?i)SAXParserFactory.*newInstance\s*\(\)(?!.*setFeature)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)SAXParser.*parse\s*\(\)(?!.*setFeature)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/611.html
