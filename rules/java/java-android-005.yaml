id: java-android-005
name: Android BroadcastReceiver Exported
description: |
  Detects intent-injection issues in JAVA code.
severity: high
category: intent-injection
confidence: high
cwe: CWE-925
languages: [java]
frameworks: [android]
message: |
  Exported BroadcastReceivers can receive intents from any app. Restrict with permissions.
patterns:
  - type: regex
    pattern: '(?i)<receiver[^>]*android:exported\s*=\s*[`"]true[`"]'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)BroadcastReceiver.*onReceive.*Intent'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)sendBroadcast\s*\(.*new\s+Intent'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/925.html
