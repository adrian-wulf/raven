id: raven-java-sqli-001
name: SQL Injection in Java
description: |
  Detects SQL queries built via string concatenation or format in Java.
severity: critical
category: sql-injection
confidence: high
cwe: CWE-89
languages: [java]
message: |
  SQL injection: Use PreparedStatement with parameterized queries.
  Never concatenate user input into SQL strings.
patterns:
  - type: regex
    pattern: '(?i)(execute|executeQuery|executeUpdate)\s*\(\s*["''][^"'']*\+\s*'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)String\.format\s*\(\s*["''][^"'']*(SELECT|INSERT|UPDATE|DELETE)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)query\s*\+\s*=\s*[^;]*request\.getParameter'
    where:
      - not-test-file: true
references:
  - https://cheatsheetseries.owasp.org/cheatsheets/SQL_Injection_Prevention_Cheat_Sheet.html
