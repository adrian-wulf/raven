id: java-cors-004
name: Servlet CORS Header Injection
description: |
  Detects cors-misconfiguration issues in JAVA code.
severity: medium
category: cors-misconfiguration
confidence: medium
cwe: CWE-942
languages: [java]
frameworks: [servlet]
message: |
  Setting Access-Control-Allow-Origin to user-controlled values is dangerous.
patterns:
  - type: regex
    pattern: '(?i)response\.setHeader\s*\(\s*[`"]Access-Control-Allow-Origin[`"]\s*,\s*.*request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)response\.setHeader\s*\(\s*[`"]Access-Control-Allow-Origin[`"]\s*,\s*[`"]\*[`"]'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/942.html
