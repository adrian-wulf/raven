id: go-deser-002
name: json.Unmarshal into interface{} Type Confusion
description: |
  Detects insecure-deserialization issues in GO code.
severity: high
category: insecure-deserialization
confidence: medium
cwe: CWE-502
languages: [go]
message: |
  Avoid unmarshaling JSON into interface{} when type safety is required. Use concrete types.
patterns:
  - type: regex
    pattern: '(?i)json\.Unmarshal\s*\(.*&.*interface\{\}'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)json\.Unmarshal\s*\(.*map\[string\]interface'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)json\.NewDecoder\s*\(.*\)\.Decode\s*\(.*interface'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/502.html
