id: php-lfi-002
name: require User Path LFI
description: |
  Detects file-inclusion issues in PHP code.
severity: critical
category: file-inclusion
confidence: critical
cwe: CWE-98
languages: [php]
message: |
  require with user input allows LFI and potential RCE.
patterns:
  - type: regex
    pattern: '(?i)require_once\s*\(\s*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)require\s*\(\s*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/98.html
