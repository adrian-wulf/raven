id: go-cmdi-007
name: syscall.Exec User Input
description: |
  Detects command-injection issues in GO code.
severity: critical
category: command-injection
confidence: high
cwe: CWE-78
languages: [go]
message: |
  syscall.Exec with user-controlled paths can execute arbitrary binaries.
patterns:
  - type: regex
    pattern: '(?i)syscall\.Exec\s*\(\s*.*(r\.|req|param|input|user)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)syscall\.ForkExec\s*\(\s*.*(r\.|req|param|input|user)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/78.html
