id: go-echo-001
name: Echo Binding without Validation
description: |
  Detects mass-assignment issues in GO code.
severity: high
category: mass-assignment
confidence: medium
cwe: CWE-915
languages: [go]
frameworks: [echo]
message: |
  Validate all inputs after binding in Echo. Use custom validator with e.Validator.
patterns:
  - type: regex
    pattern: '(?i)c\.Bind\s*\(&'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)e\.Validator\s*=\s*nil'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/915.html
