id: gen-config-001
name: Insecure TLS Version Enabled
severity: high
category: config
confidence: high
cwe: "CWE-326"
languages: [javascript, python, go, java, csharp, ruby]
message: "TLS 1.0 or 1.1 enabled. Use minimum TLS 1.2 (preferably TLS 1.3). Older versions have known vulnerabilities."
patterns:
  - type: regex
    pattern: "(TLSv1\\.0|TLSv1\\.1|SSLv3|TLSv1|TLSv1_1|tls1\\.0|tls1\\.1|MinVersion:.*VersionTLS10|MinVersion:.*VersionTLS11)"
references:
  - https://cwe.mitre.org/data/definitions/326.html
