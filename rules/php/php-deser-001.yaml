id: php-deser-001
name: unserialize User Input Object Injection
description: |
  Detects insecure-deserialization issues in PHP code.
severity: critical
category: insecure-deserialization
confidence: critical
cwe: CWE-502
languages: [php]
message: |
  unserialize() on user input can instantiate arbitrary objects leading to RCE.
patterns:
  - type: regex
    pattern: '(?i)unserialize\s*\(\s*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)unserialize\s*\(\s*\$.*input'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)unserialize\s*\(\s*\$.*data'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/502.html
