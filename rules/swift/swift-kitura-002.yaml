id: swift-kitura-002
name: Kitura Stencil Template Injection
description: |
  Detects ssti issues in SWIFT code.
severity: high
category: ssti
confidence: high
cwe: CWE-1336
languages: [swift]
frameworks: [kitura]
message: |
  Stencil templates with user content enable SSTI.
patterns:
  - type: regex
    pattern: '(?i)Stencil.*renderTemplate\s*\(\s*.*user'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)response\.render\s*\(\s*.*params'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/1336.html
