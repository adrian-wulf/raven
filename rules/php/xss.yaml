id: raven-php-xss-001
name: XSS in PHP
description: |
  Detects direct output of user input in PHP without HTML encoding,
  which can lead to cross-site scripting attacks.
severity: high
category: xss
confidence: high
languages: [php]
message: |
  Potential XSS: user input is output directly without HTML encoding.
  Use htmlspecialchars($data, ENT_QUOTES, 'UTF-8') before output.
patterns:
  - type: regex
    pattern: 'echo\s+\$_(GET|POST|REQUEST|COOKIE)'
    where:
      - not-test-file: true
      - not-sanitized:
          - htmlspecialchars
          - htmlentities
  - type: regex
    pattern: 'print\s+\$_(GET|POST|REQUEST|COOKIE)'
    where:
      - not-test-file: true
      - not-sanitized:
          - htmlspecialchars
          - htmlentities
  - type: regex
    pattern: '<\?php\s+echo\s+\$[^;]+;\s*\?>'
    where:
      - not-test-file: true
      - not-sanitized:
          - htmlspecialchars
          - htmlentities
references:
  - https://owasp.org/www-community/attacks/xss/
