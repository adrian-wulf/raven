id: java-log4j-002
name: Log4j Message Lookup Enabled
description: |
  Detects code-injection issues in JAVA code.
severity: critical
category: code-injection
confidence: critical
cwe: CWE-77
languages: [java]
frameworks: [log4j]
message: |
  Message lookups in log4j can trigger JNDI. Disable with %m{nolookups}.
patterns:
  - type: regex
    pattern: '(?i)log4j2\.formatMsgNoLookups.*false'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)%m\{lookups\}'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)PatternLayout.*%m.*(?!nolookups)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/77.html
