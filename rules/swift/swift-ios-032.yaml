id: swift-ios-032
name: Hardcoded Key Swift
description: |
  Detects hardcoded-secrets issues in SWIFT code.
severity: critical
category: hardcoded-secrets
confidence: critical
cwe: CWE-798
languages: [swift]
frameworks: [ios]
message: |
  Hardcoded encryption keys can be extracted from the binary.
patterns:
  - type: regex
    pattern: '(?i)let\s+\w*key\w*\s*=\s*[''"][^''"]{8,}[''"]'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)let\s+\w*secret\w*\s*=\s*[''"][^''"]{8,}[''"]'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)String\s*\(\s*[''"][^''"]{16,}[''"]\s*\).*key'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/798.html
