id: swift-ios-011
name: ATS Bypass allows HTTP
description: |
  Detects insecure-communication issues in SWIFT code.
severity: high
category: insecure-communication
confidence: high
cwe: CWE-319
languages: [swift]
frameworks: [ios]
message: |
  Disabling ATS allows insecure HTTP connections.
patterns:
  - type: regex
    pattern: '(?i)NSAllowsArbitraryLoads\s*YES'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)NSExceptionAllowsInsecureHTTPLoads\s*YES'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)App Transport Security.*false'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/319.html
