id: c-uaf-001
name: Use-After-Free
description: |
  Detects use-after-free issues in C code.
severity: critical
category: use-after-free
confidence: critical
cwe: CWE-416
languages: [c]
message: |
  Accessing freed memory causes crashes or arbitrary code execution.
patterns:
  - type: regex
    pattern: '(?i)free\s*\(\s*\w+\s*\).*\w+'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)free\s*\(.*\).*\w+.*='
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)free\s*\(.*\).*\w+\[.*\]'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/416.html
