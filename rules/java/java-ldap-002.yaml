id: java-ldap-002
name: Spring LdapTemplate Filter Injection
description: |
  Detects ldap-injection issues in JAVA code.
severity: critical
category: ldap-injection
confidence: high
cwe: CWE-90
languages: [java]
frameworks: [spring]
message: |
  LdapTemplate with user-controlled filters enables LDAP injection.
patterns:
  - type: regex
    pattern: '(?i)ldapTemplate\.search\s*\(.*request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)ldapTemplate\.find\s*\(.*request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)ldapTemplate\.authenticate\s*\(.*request'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/90.html
