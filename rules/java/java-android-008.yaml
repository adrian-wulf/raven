id: java-android-008
name: Android DexClassLoader Dynamic Loading
description: |
  Detects code-injection issues in JAVA code.
severity: high
category: code-injection
confidence: high
cwe: CWE-94
languages: [java]
frameworks: [android]
message: |
  DexClassLoader loading from external storage can execute malicious code.
patterns:
  - type: regex
    pattern: '(?i)new\s+DexClassLoader'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)PathClassLoader.*external'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)DexClassLoader.*loadClass'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/94.html
