id: js-adv-011
name: JavaScript EventEmitter Memory Leak DoS
severity: medium
category: rce
confidence: high
cwe: "CWE-770"
languages: [javascript, typescript]
message: "Unbounded EventEmitter listeners can cause memory leak DoS. Set maxListeners limit."
patterns:
  - type: regex
    pattern: "on\\s*\\(.*\\).*\\{|addListener.*\\{|emitter\\.on\\s*\\("
references:
  - https://cwe.mitre.org/data/definitions/770.html
