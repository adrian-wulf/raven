id: go-revel-002
name: Revel Template Rendering XSS
description: |
  Detects xss issues in GO code.
severity: high
category: xss
confidence: high
cwe: CWE-79
languages: [go]
frameworks: [revel]
message: |
  Use Revel's template auto-escaping. Avoid raw HTML output with user data.
patterns:
  - type: regex
    pattern: '(?i)c\.RenderJson\s*\('
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)template\.HTML\s*\(.*c\.Params'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/79.html
