id: kotlin-deser-001
name: Kotlin ObjectInputStream RCE
description: |
  Detects insecure-deserialization issues in KOTLIN code.
severity: critical
category: insecure-deserialization
confidence: critical
cwe: CWE-502
languages: [kotlin]
message: |
  ObjectInputStream on untrusted data can execute arbitrary code.
patterns:
  - type: regex
    pattern: '(?i)ObjectInputStream\s*\(.*request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)ObjectInputStream.*readObject'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)readObject\s*\(\s*\)(?!.*LookAhead)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/502.html
