id: swift-kitura-003
name: Kitura Kuery SQLi
description: |
  Detects sql-injection issues in SWIFT code.
severity: critical
category: sql-injection
confidence: critical
cwe: CWE-89
languages: [swift]
frameworks: [kitura]
message: |
  Kuery raw SQL with user input allows injection.
patterns:
  - type: regex
    pattern: '(?i)Raw\s*\(\s*[''"].*\$'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)Table.*select.*where.*[''"].*\+'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)Query.*filter\s*\(\s*[''"].*\$'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/89.html
