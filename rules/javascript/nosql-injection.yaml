id: raven-js-nosql-001
name: NoSQL Injection
description: |
  Detects MongoDB queries built with user input that could allow
  NoSQL injection (e.g., $ne, $gt operators injected).
severity: high
category: nosql-injection
confidence: high
languages: [javascript, typescript]
message: |
  Potential NoSQL injection. Never pass user input directly to MongoDB
  queries. Use schema validation and sanitize operators like $ne, $gt.
patterns:
  - type: regex
    pattern: "find\\s*\\(\\s*\\{[^}]*(req\\.|request\\.|params\\.|body\\.|query\\.)"
  - type: regex
    pattern: "findOne\\s*\\(\\s*\\{[^}]*(req\\.|request\\.|params\\.|body\\.|query\\.)"
  - type: regex
    pattern: "updateOne\\s*\\(\\s*\\{[^}]*(req\\.|request\\.|params\\.|body\\.|query\\.)"
  - type: regex
    pattern: "aggregate\\s*\\(\\s*\\[\\s*\\{[^}]*(req\\.|request\\.|params\\.|body\\.|query\\.)"
references:
  - https://owasp.org/www-community/attacks/NoSQL_Injection
