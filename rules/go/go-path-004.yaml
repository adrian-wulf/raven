id: go-path-004
name: http.ServeFile Path Traversal
description: |
  Detects path-traversal issues in GO code.
severity: high
category: path-traversal
confidence: high
cwe: CWE-22
languages: [go]
message: |
  http.ServeFile can expose arbitrary files if path is user-controlled. Validate paths.
patterns:
  - type: regex
    pattern: '(?i)http\.ServeFile\s*\(\s*w\s*,\s*r\s*,\s*.*(r\.|req|param|input|user|filename|path)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)http\.ServeFile\s*\(\s*.*\+'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/22.html
