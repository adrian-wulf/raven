id: gen-infoleak-003
name: Sensitive Data in URL Parameters
severity: medium
category: infoleak
confidence: medium
cwe: "CWE-200"
languages: [javascript, python, java, php, csharp]
message: "Sensitive data may be transmitted in URL parameters. URLs are logged in browser history and server logs. Use POST body instead."
patterns:
  - type: regex
    pattern: "(password|token|secret|api_key|ssn)\\s*[=:]\\s*[^&\\s]{8,}"
    where:
      - not-test-file: true
      - not-constant: true
references:
  - https://cwe.mitre.org/data/definitions/200.html
