id: rust-actix-003
name: Actix web::Data Unsound
description: |
  Detects memory-safety issues in RUST code.
severity: medium
category: memory-safety
confidence: medium
cwe: CWE-843
languages: [rust]
frameworks: [actix]
message: |
  web::Data with interior mutability can cause data races.
patterns:
  - type: regex
    pattern: '(?i)web::Data<.*RefCell'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)web::Data<.*Mutex.*(?!lock)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/843.html
