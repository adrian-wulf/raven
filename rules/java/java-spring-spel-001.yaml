id: java-spring-spel-001
name: Spring SpEL Expression Injection
description: |
  Detects expression-injection issues in JAVA code.
severity: critical
category: expression-injection
confidence: high
cwe: CWE-917
languages: [java]
frameworks: [spring]
message: |
  SpEL expressions can execute arbitrary code. Never evaluate user-controlled expressions.
patterns:
  - type: regex
    pattern: '(?i)parser\.parseExpression\s*\(.*request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)SpelExpressionParser.*parseExpression\s*\(.*\+'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)EvaluationContext.*setVariable\s*\(.*request'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/917.html
