id: kotlin-android-028
name: Android PendingIntent Mutable
description: |
  Detects intent-injection issues in KOTLIN code.
severity: high
category: intent-injection
confidence: high
cwe: CWE-940
languages: [kotlin]
frameworks: [android]
message: |
  Mutable PendingIntents can be modified by malicious apps.
patterns:
  - type: regex
    pattern: '(?i)PendingIntent\.getActivity\s*\(.*(?!FLAG_IMMUTABLE)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)PendingIntent\.getService\s*\(.*(?!FLAG_IMMUTABLE)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)PendingIntent\.getBroadcast\s*\(.*(?!FLAG_IMMUTABLE)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/940.html
