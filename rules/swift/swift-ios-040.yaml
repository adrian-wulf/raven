id: swift-ios-040
name: Certificate Pinning Bypass
description: |
  Detects weak-cryptography issues in SWIFT code.
severity: high
category: weak-cryptography
confidence: high
cwe: CWE-295
languages: [swift]
frameworks: [ios]
message: |
  Disabling certificate pinning enables MITM attacks.
patterns:
  - type: regex
    pattern: '(?i)trustManager.*return\s*true'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)NSURLAuthenticationChallenge.*cancel(?!.*perform)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/295.html
