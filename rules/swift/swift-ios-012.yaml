id: swift-ios-012
name: UIWebView Deprecated
description: |
  Detects insecure-configuration issues in SWIFT code.
severity: medium
category: insecure-configuration
confidence: medium
cwe: CWE-1104
languages: [swift]
frameworks: [ios]
message: |
  UIWebView is deprecated. Use WKWebView instead.
patterns:
  - type: regex
    pattern: '(?i)UIWebView'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)UIWebViewDelegate'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)loadRequest.*UIWebView'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/1104.html
