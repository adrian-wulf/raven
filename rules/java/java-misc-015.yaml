id: java-misc-015
name: Spring Data REST Exposure
description: |
  Detects information-disclosure issues in JAVA code.
severity: high
category: information-disclosure
confidence: high
cwe: CWE-200
languages: [java]
frameworks: [spring]
message: |
  Exposing all Spring Data repositories via REST can leak sensitive data.
patterns:
  - type: regex
    pattern: '(?i)@RepositoryRestResource'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)spring\.data\.rest\.base-path'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)RepositoryRestConfigurer'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/200.html
