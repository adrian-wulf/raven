id: py-django-password-001
name: PBKDF2 low iterations
severity: medium
category: crypto
confidence: medium
cwe: CWE-916
languages:
- python
message: Low PBKDF2 iterations make password hashing weaker. Use Django defaults.
patterns:
- type: regex
  pattern: PBKDF2PasswordHasher.*iterations\s*=\s*\d{3,4}\b
  where: []
references:
- https://cwe.mitre.org/data/definitions/916.html
frameworks:
- django
