id: rust-unsafe-001
name: Raw Pointer Dereference
description: |
  Detects memory-safety issues in RUST code.
severity: high
category: memory-safety
confidence: high
cwe: CWE-476
languages: [rust]
message: |
  Raw pointer dereference is unsafe and can cause segfaults.
patterns:
  - type: regex
    pattern: '(?i)unsafe\s*\{.*\*const'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)unsafe\s*\{.*\*mut'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)ptr::read\s*\('
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/476.html
