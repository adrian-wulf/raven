id: docker-secret-002
name: ARG SECRET_KEY
severity: critical
category: secrets
confidence: high
cwe: CWE-798
languages:
- dockerfile
message: SECRET_KEY in ARG can leak in build history. Use --secret mount or runtime injection.
patterns:
- type: regex
  pattern: ARG\s+SECRET_KEY\s*=\s*\S+
  where: []
references:
- https://cwe.mitre.org/data/definitions/798.html
