id: java-spring-cors-001
name: Spring @CrossOrigin Allow All
description: |
  Detects cors-misconfiguration issues in JAVA code.
severity: medium
category: cors-misconfiguration
confidence: medium
cwe: CWE-942
languages: [java]
frameworks: [spring]
message: |
  @CrossOrigin(origins="*") allows any domain to access the endpoint.
patterns:
  - type: regex
    pattern: '(?i)@CrossOrigin\s*\(\s*origins\s*=\s*[`"]\*[`"]'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)@CrossOrigin.*origins.*\*'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/942.html
