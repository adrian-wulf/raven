id: ruby-cmd-003
name: Ruby exec Command Injection
description: |
  Detects command-injection issues in RUBY code.
severity: critical
category: command-injection
confidence: critical
cwe: CWE-78
languages: [ruby]
message: |
  exec() replaces process and can execute arbitrary commands.
patterns:
  - type: regex
    pattern: '(?i)exec\s*\(\s*.*params'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)exec\s*\(\s*[''"].*\#\{'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/78.html
