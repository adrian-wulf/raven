id: go-gin-002
name: Gin Context Bind without Validation
description: |
  Detects mass-assignment issues in GO code.
severity: high
category: mass-assignment
confidence: medium
cwe: CWE-915
languages: [go]
frameworks: [gin]
message: |
  Always validate struct fields after binding. Use binding tags and custom validators.
patterns:
  - type: regex
    pattern: '(?i)c\.Bind\s*\(&'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)c\.ShouldBindJSON\s*\(&[^}]*\}'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/915.html
