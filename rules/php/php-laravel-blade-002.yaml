id: php-laravel-blade-002
name: Laravel Blade @php Code Execution
description: |
  Detects code-injection issues in PHP code.
severity: critical
category: code-injection
confidence: critical
cwe: CWE-94
languages: [php]
frameworks: [laravel]
message: |
  @php directive can execute arbitrary PHP code. Restrict its usage.
patterns:
  - type: regex
    pattern: '(?i)@php\s*\(.*eval\s*\('
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)@php\s*\(.*exec\s*\('
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)@php\s*\(.*shell_exec'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/94.html
