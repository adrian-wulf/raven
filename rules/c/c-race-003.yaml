id: c-race-003
name: fork exec Race
description: |
  Detects race-condition issues in C code.
severity: medium
category: race-condition
confidence: medium
cwe: CWE-362
languages: [c]
message: |
  Race between fork and exec can allow file descriptor injection.
patterns:
  - type: regex
    pattern: '(?i)fork\s*\(\).*exec'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)fork\s*\(\).*//.*race'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/362.html
