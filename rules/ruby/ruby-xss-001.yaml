id: ruby-xss-001
name: Rails html_safe XSS
description: |
  Detects xss issues in RUBY code.
severity: critical
category: xss
confidence: critical
cwe: CWE-79
languages: [ruby]
frameworks: [rails]
message: |
  html_safe marks strings as safe without escaping. Never use with user input.
patterns:
  - type: regex
    pattern: '(?i)\.html_safe'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)html_safe.*params'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)html_safe.*user'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/79.html
