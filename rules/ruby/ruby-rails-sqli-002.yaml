id: ruby-rails-sqli-002
name: Rails find_by_sql Injection
description: |
  Detects sql-injection issues in RUBY code.
severity: critical
category: sql-injection
confidence: high
cwe: CWE-89
languages: [ruby]
frameworks: [rails]
message: |
  find_by_sql with string interpolation allows SQL injection.
patterns:
  - type: regex
    pattern: '(?i)find_by_sql\s*\(\s*[''"].*\#\{'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)find_by_sql\s*\(\s*[''"].*params'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)find_by_sql\s*\(\s*[''"].*SELECT'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/89.html
