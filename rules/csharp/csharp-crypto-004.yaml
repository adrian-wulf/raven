id: csharp-crypto-004
name: Hardcoded Encryption Key
description: |
  Detects hardcoded-secrets issues in CSHARP code.
severity: critical
category: hardcoded-secrets
confidence: critical
cwe: CWE-798
languages: [csharp]
message: |
  Hardcoded keys can be extracted from assembly. Use Azure Key Vault.
patterns:
  - type: regex
    pattern: '(?i)byte\[\]\s+\w*(key|secret)\s*=\s*\{'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)string\s+\w*(key|secret)\s*=\s*[''"][^''"]{8,}[''"]'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/798.html
