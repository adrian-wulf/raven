id: rust-deser-004
name: postcard Untrusted Deserialization
description: |
  Detects insecure-deserialization issues in RUST code.
severity: medium
category: insecure-deserialization
confidence: medium
cwe: CWE-502
languages: [rust]
frameworks: [postcard]
message: |
  postcard deserialization without schema validation can be exploited.
patterns:
  - type: regex
    pattern: '(?i)postcard::from_bytes\s*\(.*user'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)postcard::from_bytes\s*\(.*request'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/502.html
