id: ruby-cmd-004
name: Ruby popen Command Injection
description: |
  Detects command-injection issues in RUBY code.
severity: critical
category: command-injection
confidence: high
cwe: CWE-78
languages: [ruby]
message: |
  IO.popen with user input allows command injection.
patterns:
  - type: regex
    pattern: '(?i)IO\.popen\s*\(\s*.*params'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)popen\s*\(\s*[''"].*\#\{'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/78.html
