id: rust-sqli-001
name: diesel raw_sql Injection
description: |
  Detects sql-injection issues in RUST code.
severity: critical
category: sql-injection
confidence: high
cwe: CWE-89
languages: [rust]
frameworks: [diesel]
message: |
  diesel raw_sql with user input allows SQL injection.
patterns:
  - type: regex
    pattern: '(?i)sql_query\s*\(.*format!'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)sql_query\s*\(.*[''"].*\$'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)diesel::sql_query\s*\(.*[''"].*\+'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/89.html
