id: cpp-raii-001
name: Manual Memory Management Instead of RAII
description: |
  Detects resource-leak issues in CPP code.
severity: medium
category: resource-leak
confidence: medium
cwe: CWE-401
languages: [cpp]
message: |
  Manual new/delete should be replaced with smart pointers or containers.
patterns:
  - type: regex
    pattern: '(?i)delete\s+\w+;(?!.*unique_ptr)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)delete\[\]\s+\w+;(?!.*vector)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/401.html
