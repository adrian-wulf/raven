id: gen-nosql-003
name: MongoDB Injection in Express Route
severity: high
category: nosql
confidence: medium
cwe: "CWE-943"
languages: [javascript]
message: "User input may flow into a MongoDB query. Verify that req.query/body/params is sanitized before use in find/update/delete."
patterns:
  - type: regex
    pattern: "(req\\.query|req\\.body|req\\.params)"
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/943.html
