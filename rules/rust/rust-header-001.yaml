id: rust-header-001
name: HTTP Header Injection
description: |
  Detects http-header-injection issues in RUST code.
severity: high
category: http-header-injection
confidence: high
cwe: CWE-644
languages: [rust]
message: |
  User data in HTTP headers without sanitization can inject newlines.
patterns:
  - type: regex
    pattern: '(?i)HeaderName::from_static.*user'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)HeaderValue::from_str.*user(?!.*sanitize)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/644.html
