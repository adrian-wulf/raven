id: js-angular-storage-001
name: Sensitive data in sessionStorage
severity: high
category: crypto
confidence: high
cwe: CWE-522
languages:
- javascript
- typescript
message: Storing sensitive data in sessionStorage is accessible to XSS attacks. Use secure cookies.
patterns:
- type: regex
  pattern: sessionStorage\.(setItem|getItem)\s*\(\s*[\"\'].*(password|token|secret|key)
  where: []
references:
- https://cwe.mitre.org/data/definitions/522.html
frameworks:
- angular
