id: php-laravel-blade-003
name: Laravel Blade Raw Output XSS
description: |
  Detects xss issues in PHP code.
severity: critical
category: xss
confidence: critical
cwe: CWE-79
languages: [php]
frameworks: [laravel]
message: |
  {!! !!} outputs raw HTML without escaping. Never use with user input.
patterns:
  - type: regex
    pattern: '(?i)\{!!\s*.*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)\{!!\s*.*\$request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)\{!!\s*.*\$user'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/79.html
