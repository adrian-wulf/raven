id: java-path-001
name: Spring Resource User Path
description: |
  Detects path-traversal issues in JAVA code.
severity: high
category: path-traversal
confidence: high
cwe: CWE-22
languages: [java]
frameworks: [spring]
message: |
  Spring ResourceLoader with user paths can access arbitrary files.
patterns:
  - type: regex
    pattern: '(?i)resourceLoader\.getResource\s*\(.*request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)new\s+FileSystemResource\s*\(.*request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)ServletContext.*getResource\s*\(.*request'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/22.html
