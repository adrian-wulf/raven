id: php-laravel-sqli-001
name: Laravel Eloquent Raw SQL Injection
description: |
  Detects sql-injection issues in PHP code.
severity: critical
category: sql-injection
confidence: high
cwe: CWE-89
languages: [php]
frameworks: [laravel]
message: |
  Eloquent raw() and raw SQL methods with user input enable SQL injection.
patterns:
  - type: regex
    pattern: '(?i)DB::raw\s*\(.*[''"].*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)whereRaw\s*\(.*[''"].*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)orderByRaw\s*\(.*[''"].*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)selectRaw\s*\(.*[''"].*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/89.html
