id: raven-gen-password-001
name: Hardcoded Password in Code
description: |
  Detects hardcoded passwords in source code.
severity: critical
category: secrets
confidence: high
cwe: CWE-798
languages: [javascript, typescript, python, go, php, java, csharp, rust, ruby, swift, kotlin]
message: |
  Hardcoded password detected! Use environment variables or secret manager.
patterns:
  - type: regex
    pattern: "(password|passwd|pwd)\\s*[:=]\\s*['\"][^'\"]+['\"]"
