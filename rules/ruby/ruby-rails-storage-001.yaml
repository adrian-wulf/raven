id: ruby-rails-storage-001
name: ActiveStorage Path Traversal
description: |
  Detects path-traversal issues in RUBY code.
severity: high
category: path-traversal
confidence: high
cwe: CWE-22
languages: [ruby]
frameworks: [rails]
message: |
  ActiveStorage filename can contain path traversal.
patterns:
  - type: regex
    pattern: '(?i)ActiveStorage.*filename.*params'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)attach\s*\(\s*.*params.*filename'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/22.html
