id: php-mail-002
name: PHPMailer setFrom User Input
description: |
  Detects smtp-injection issues in PHP code.
severity: high
category: smtp-injection
confidence: high
cwe: CWE-93
languages: [php]
frameworks: [phpmailer]
message: |
  PHPMailer setFrom with user input can spoof sender addresses.
patterns:
  - type: regex
    pattern: '(?i)setFrom\s*\(\s*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)addAddress\s*\(\s*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/93.html
