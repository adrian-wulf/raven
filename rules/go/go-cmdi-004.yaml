id: go-cmdi-004
name: exec.CommandContext User Input Injection
description: |
  Detects command-injection issues in GO code.
severity: critical
category: command-injection
confidence: high
cwe: CWE-78
languages: [go]
message: |
  Validate all inputs to CommandContext. Use explicit argument lists instead of shell strings.
patterns:
  - type: regex
    pattern: '(?i)exec\.CommandContext\s*\(\s*ctx,\s*[`"][^`"]*%s'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)exec\.CommandContext\s*\(\s*ctx,\s*.*(r\.|req|request|param|input|user)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/78.html
