id: raven-aws-iam-admin-001
name: Overly permissive IAM policy
severity: high
category: cloud-security
confidence: high
cwe: CWE-16
languages: ["*"]
message: "IAM policy grants Action: * on Resource: *. Use least privilege principle."
patterns:
  - type: regex
    pattern: "Action.*\\*.*Resource.*\\*|Effect.*Allow.*Action.*\\*"
