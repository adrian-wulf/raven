id: swift-path-002
name: FileHandle User Path
description: |
  Detects path-traversal issues in SWIFT code.
severity: high
category: path-traversal
confidence: high
cwe: CWE-22
languages: [swift]
message: |
  FileHandle with user paths can read/write arbitrary files.
patterns:
  - type: regex
    pattern: '(?i)FileHandle\s*\(\s*forReadingFrom:\s*.*user'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)FileHandle\s*\(\s*forWritingTo:\s*.*input'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/22.html
