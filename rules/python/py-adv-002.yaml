id: py-adv-002
name: Python yaml.load Without Safe Loader
severity: critical
category: rce
confidence: high
cwe: "CWE-502"
languages: [python]
message: "yaml.load without SafeLoader allows arbitrary code execution. Always use yaml.safe_load()."
patterns:
