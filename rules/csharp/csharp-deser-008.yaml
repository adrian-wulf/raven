id: csharp-deser-008
name: XmlSerializer Type Control
description: |
  Detects insecure-deserialization issues in CSHARP code.
severity: high
category: insecure-deserialization
confidence: high
cwe: CWE-502
languages: [csharp]
message: |
  XmlSerializer with user-controlled types can deserialize dangerous objects.
patterns:
  - type: regex
    pattern: '(?i)new\s+XmlSerializer\s*\(\s*Type\.GetType'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)XmlSerializer.*Deserialize.*Request'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/502.html
