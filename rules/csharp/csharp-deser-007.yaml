id: csharp-deser-007
name: JavaScriptSerializer Deserialization
description: |
  Detects insecure-deserialization issues in CSHARP code.
severity: high
category: insecure-deserialization
confidence: high
cwe: CWE-502
languages: [csharp]
message: |
  JavaScriptSerializer with type resolver can instantiate arbitrary types.
patterns:
  - type: regex
    pattern: '(?i)new\s+JavaScriptSerializer'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)JavaScriptSerializer.*Deserialize'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)SimpleTypeResolver'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/502.html
