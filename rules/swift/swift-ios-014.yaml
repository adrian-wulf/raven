id: swift-ios-014
name: JavaScript Bridge without Validation
description: |
  Detects xss issues in SWIFT code.
severity: high
category: xss
confidence: high
cwe: CWE-749
languages: [swift]
frameworks: [ios]
message: |
  JavaScript bridge must validate all messages from web content.
patterns:
  - type: regex
    pattern: '(?i)userContentController\s*\(\s*.*didReceive'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)WKScriptMessage.*body.*(?!.*validate)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/749.html
