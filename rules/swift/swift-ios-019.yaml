id: swift-ios-019
name: URLSession Redirect without Validation
description: |
  Detects ssrf issues in SWIFT code.
severity: high
category: ssrf
confidence: high
cwe: CWE-918
languages: [swift]
frameworks: [ios]
message: |
  Following redirects without validation can lead to malicious sites.
patterns:
  - type: regex
    pattern: '(?i)URLSession.*delegate.*willPerformHTTPRedirection'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)URLSession.*redirect(?!.*validate)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/918.html
