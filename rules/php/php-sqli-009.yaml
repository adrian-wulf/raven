id: php-sqli-009
name: Prepared Statement String Concatenation Bypass
description: |
  Detects sql-injection issues in PHP code.
severity: critical
category: sql-injection
confidence: high
cwe: CWE-89
languages: [php]
message: |
  Concatenating into prepared statement queries bypasses parameterization.
patterns:
  - type: regex
    pattern: '(?i)prepare\s*\(.*[''"].*\$.*\?.*[''"]'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)prepare\s*\(.*[''"].*\$.*:.*[''"]'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/89.html
