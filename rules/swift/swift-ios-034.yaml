id: swift-ios-034
name: SecKey without Proper Params
description: |
  Detects weak-cryptography issues in SWIFT code.
severity: high
category: weak-cryptography
confidence: high
cwe: CWE-326
languages: [swift]
frameworks: [ios]
message: |
  SecKey creation with weak parameters reduces key security.
patterns:
  - type: regex
    pattern: '(?i)SecKeyCreateWithData.*kSecAttrKeyTypeRSA.*512'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)SecKeyGeneratePair.*512'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/326.html
