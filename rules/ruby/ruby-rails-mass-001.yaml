id: ruby-rails-mass-001
name: Rails attr_accessible All
description: |
  Detects mass-assignment issues in RUBY code.
severity: critical
category: mass-assignment
confidence: critical
cwe: CWE-915
languages: [ruby]
frameworks: [rails]
message: |
  attr_accessible with all attributes allows mass assignment.
patterns:
  - type: regex
    pattern: '(?i)attr_accessible\s+:*all'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)attr_accessible\s+.*admin'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)attr_accessible\s+.*role'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/915.html
