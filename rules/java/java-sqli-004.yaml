id: java-sqli-004
name: MyBatis $ Parameter Injection
description: |
  Detects sql-injection issues in JAVA code.
severity: critical
category: sql-injection
confidence: high
cwe: CWE-89
languages: [java]
frameworks: [mybatis]
message: |
  MyBatis ${} syntax does parameter substitution, not prepared statements. Use #{}.
patterns:
  - type: regex
    pattern: '\$\{\w+\}.*WHERE'
    where:
      - not-test-file: true
  - type: regex
    pattern: '\$\{\w+\}.*ORDER\s+BY'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)mybatis.*\$\{.*param'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/89.html
