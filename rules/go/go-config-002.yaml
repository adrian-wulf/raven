id: go-config-002
name: Viper Config Without Validation
description: |
  Detects insecure-configuration issues in GO code.
severity: low
category: insecure-configuration
confidence: low
cwe: CWE-20
languages: [go]
frameworks: [viper]
message: |
  Always validate configuration values loaded via Viper before use.
patterns:
  - type: regex
    pattern: '(?i)viper\.GetString\s*\(\s*[`"]'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)viper\.GetInt\s*\(\s*[`"]'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/20.html
