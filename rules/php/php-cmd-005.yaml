id: php-cmd-005
name: Backtick Operator Command Injection
description: |
  Detects command-injection issues in PHP code.
severity: critical
category: command-injection
confidence: critical
cwe: CWE-78
languages: [php]
message: |
  Backtick operator executing user input is command injection.
patterns:
  - type: regex
    pattern: '(?i)`.*\$_(GET|POST|REQUEST).*?`'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)`.*\$.*user.*?`'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/78.html
