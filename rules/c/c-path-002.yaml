id: c-path-002
name: Path Traversal Dot Dot
description: |
  Detects path-traversal issues in C code.
severity: high
category: path-traversal
confidence: high
cwe: CWE-22
languages: [c]
message: |
  Paths containing .. can traverse outside intended directory.
patterns:
  - type: regex
    pattern: '(?i)[''"].*\\.\\..*[''"].*fopen'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)[''"].*\\.\\..*[''"].*open'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)strstr\s*\(.*[''"]\\.\\.[''"]'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/22.html
