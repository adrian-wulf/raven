id: php-sqli-004
name: mysqli_query String Concat
description: |
  Detects sql-injection issues in PHP code.
severity: critical
category: sql-injection
confidence: high
cwe: CWE-89
languages: [php]
message: |
  mysqli_query with concatenated strings allows SQL injection. Use mysqli_prepare.
patterns:
  - type: regex
    pattern: '(?i)mysqli_query\s*\(.*[''"].*SELECT.*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)mysqli_query\s*\(.*[''"].*WHERE.*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)mysqli_real_query\s*\(.*[''"].*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/89.html
