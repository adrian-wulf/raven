id: swift-ios-023
name: Core Data NSPredicate Concatenation
description: |
  Detects sql-injection issues in SWIFT code.
severity: critical
category: sql-injection
confidence: critical
cwe: CWE-89
languages: [swift]
frameworks: [ios]
message: |
  String concatenation in NSPredicate format enables injection.
patterns:
  - type: regex
    pattern: '(?i)predicateWithFormat\s*\(\s*[''"].*\+.*[''"]'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)NSPredicate.*format.*\(\s*[''"].*\+'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/89.html
