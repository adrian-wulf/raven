id: raven-js-header-001
name: HTTP Response Header Injection
description: |
  Detects response headers set with user-controlled input without
  sanitization, which can lead to HTTP response splitting and XSS.
severity: high
category: header-injection
confidence: high
cwe: CWE-74
languages: [javascript, typescript]
message: |
  Header injection: user input is used in HTTP response headers.
  Sanitize newlines (\\r\\n) from user input before setting headers.
patterns:
  - type: regex
    pattern: 'res\.setHeader\s*\(\s*[^)]*(req\.|request\.|params\.|body\.|query\.|user|input|data)'
    where:
      - not-test-file: true
  - type: regex
    pattern: 'res\.header\s*\(\s*[^)]*(req\.|request\.|params\.|body\.|query\.|user|input|data)'
    where:
      - not-test-file: true
  - type: regex
    pattern: 'res\.cookie\s*\(\s*[^)]*(req\.|request\.|params\.|body\.|query\.|user|input|data)'
    where:
      - not-test-file: true
references:
  - https://owasp.org/www-community/attacks/HTTP_Response_Splitting
