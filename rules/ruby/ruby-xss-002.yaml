id: ruby-xss-002
name: Rails raw XSS
description: |
  Detects xss issues in RUBY code.
severity: critical
category: xss
confidence: critical
cwe: CWE-79
languages: [ruby]
frameworks: [rails]
message: |
  raw() outputs without escaping. Never use with user content.
patterns:
  - type: regex
    pattern: '(?i)raw\s*\(\s*.*params'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)raw\s*\(\s*.*user'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)raw\s*\(\s*.*request'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/79.html
