id: cpp-concurrency-002
name: Data Race Shared Variable
description: |
  Detects race-condition issues in CPP code.
severity: high
category: race-condition
confidence: high
cwe: CWE-362
languages: [cpp]
message: |
  Unsynchronized access to shared variables causes data races.
patterns:
  - type: regex
    pattern: '(?i)std::thread.*\[.*&.*\].*//.*shared'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)std::thread.*\(\).*//.*no.*mutex'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/362.html
