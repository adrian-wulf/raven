id: java-deser-001
name: ObjectInputStream readObject RCE
description: |
  Detects insecure-deserialization issues in JAVA code.
severity: critical
category: insecure-deserialization
confidence: high
cwe: CWE-502
languages: [java]
message: |
  ObjectInputStream.readObject can execute arbitrary code. Use JSON or validate with look-ahead.
patterns:
  - type: regex
    pattern: '(?i)new\s+ObjectInputStream'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)ObjectInputStream.*readObject\s*\('
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)readObject\s*\(\).*(?<!LookAhead)ObjectInputStream'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/502.html
