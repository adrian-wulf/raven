id: java-misc-004
name: Unsafe Class Usage
description: |
  Detects memory-safety issues in JAVA code.
severity: critical
category: memory-safety
confidence: high
cwe: CWE-758
languages: [java]
message: |
  sun.misc.Unsafe bypasses Java safety checks. Avoid in production.
patterns:
  - type: regex
    pattern: '(?i)sun\.misc\.Unsafe'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)Unsafe.*allocateMemory'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)getUnsafe\s*\(\)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/758.html
