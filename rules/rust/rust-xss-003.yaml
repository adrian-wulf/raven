id: rust-xss-003
name: Handlebars Raw Helper
description: |
  Detects xss issues in RUST code.
severity: high
category: xss
confidence: high
cwe: CWE-79
languages: [rust]
frameworks: [handlebars]
message: |
  Handlebars raw helper disables escaping for user content.
patterns:
  - type: regex
    pattern: '(?i)handlebars::Handlebars.*render\s*\(.*user'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)handlebars.*register_helper.*raw'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/79.html
