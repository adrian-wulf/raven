id: raven-gen-deser-002
name: Unsafe Deserialization Pattern
description: |
  Detects deserialization of untrusted data without validation.
severity: critical
category: deserialization
confidence: high
cwe: CWE-502
languages: [javascript, typescript, python, go, php, java, csharp, rust, ruby, swift, kotlin]
message: |
  Deserializing untrusted data can execute arbitrary code. Use JSON with schema validation.
patterns:
  - type: regex
    pattern: "(?i)(unserialize|deserialize|ObjectInputStream)\\s*\\("
  - type: regex
    pattern: "(?i)pickle\\.(loads?|dump|load|unpickle)"
  - type: regex
    pattern: "(?i)yaml\\.load\\s*\\("
  - type: regex
    pattern: "(?i)jsonpickle\\.(decode|unpickle)"
