id: php-xxe-001
name: libxml_disable_entity_loader False
description: |
  Detects xxe issues in PHP code.
severity: critical
category: xxe
confidence: critical
cwe: CWE-611
languages: [php]
message: |
  Setting libxml_disable_entity_loader(false) enables XXE attacks.
patterns:
  - type: regex
    pattern: '(?i)libxml_disable_entity_loader\s*\(\s*false\s*\)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)libxml_disable_entity_loader\s*\(\s*0\s*\)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/611.html
