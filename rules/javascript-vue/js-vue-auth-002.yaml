id: js-vue-auth-002
name: Token storage in localStorage
severity: high
category: crypto
confidence: high
cwe: CWE-522
languages:
- javascript
- typescript
message: Storing auth tokens in localStorage makes them vulnerable to XSS. Use httpOnly cookies.
patterns:
- type: regex
  pattern: localStorage\.(setItem|getItem)\s*\(\s*[\"\'](token|auth|jwt)
  where: []
references:
- https://cwe.mitre.org/data/definitions/522.html
frameworks:
- vue
