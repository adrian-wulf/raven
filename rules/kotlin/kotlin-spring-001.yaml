id: kotlin-spring-001
name: Spring @RequestParam Injection
description: |
  Detects injection issues in KOTLIN code.
severity: high
category: injection
confidence: high
cwe: CWE-74
languages: [kotlin]
frameworks: [spring]
message: |
  @RequestParam values should be validated before use.
patterns:
  - type: regex
    pattern: '(?i)@RequestParam.*String.*(?!.*validate)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)@RequestParam.*(?!.*pattern)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/74.html
