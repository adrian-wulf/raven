id: php-ssrf-003
name: fsockopen User URL SSRF
description: |
  Detects ssrf issues in PHP code.
severity: high
category: ssrf
confidence: high
cwe: CWE-918
languages: [php]
message: |
  fsockopen with user-controlled hosts enables SSRF.
patterns:
  - type: regex
    pattern: '(?i)fsockopen\s*\(\s*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)fsockopen\s*\(.*[''"].*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/918.html
