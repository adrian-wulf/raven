id: py-adv-003
name: Python tempfile Race Condition
severity: medium
category: rce
confidence: high
cwe: "CWE-362"
languages: [python]
message: "Temporary file creation without proper permissions may be vulnerable to race condition. Use tempfile.mkstemp()."
patterns:
  - type: regex
    pattern: "open\\s*\\(.*tempfile|tempfile\\.mktemp\\s*\\("
references:
  - https://cwe.mitre.org/data/definitions/362.html
