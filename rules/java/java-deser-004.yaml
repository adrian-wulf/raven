id: java-deser-004
name: Jackson ObjectMapper Without Validation
description: |
  Detects insecure-deserialization issues in JAVA code.
severity: high
category: insecure-deserialization
confidence: medium
cwe: CWE-502
languages: [java]
frameworks: [jackson]
message: |
  ObjectMapper should disable default typing and validate input.
patterns:
  - type: regex
    pattern: '(?i)new\s+ObjectMapper\s*\(\)(?!.*disableDefaultTyping)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)ObjectMapper.*readValue\s*\(.*request'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/502.html
