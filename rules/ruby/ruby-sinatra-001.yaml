id: ruby-sinatra-001
name: Sinatra Param Injection
description: |
  Detects injection issues in RUBY code.
severity: high
category: injection
confidence: high
cwe: CWE-74
languages: [ruby]
frameworks: [sinatra]
message: |
  Sinatra params without validation can inject malicious data.
patterns:
  - type: regex
    pattern: '(?i)get\s+[''"].*[''"]\s+do.*params'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)post\s+[''"].*[''"]\s+do.*params'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/74.html
