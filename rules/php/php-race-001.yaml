id: php-race-001
name: File Operation Race Condition
description: |
  Detects race-condition issues in PHP code.
severity: medium
category: race-condition
confidence: medium
cwe: CWE-367
languages: [php]
message: |
  Checking file existence before operations is vulnerable to TOCTOU.
patterns:
  - type: regex
    pattern: '(?i)file_exists\s*\(.*\).*fopen'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)is_file\s*\(.*\).*file_get_contents'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/367.html
