id: raven-go-json-001
name: Go json.Unmarshal to interface{}
description: |
  Detects unmarshaling JSON into interface{} which can enable type confusion attacks.
severity: low
category: deserialization
confidence: low
cwe: CWE-502
languages: [go]
message: |
  Unmarshaling into interface{} loses type safety. Use strongly typed structs.
patterns:
  - type: regex
    pattern: "json\\.Unmarshal\\s*\\([^,]*,\\s*&[^)]*interface\\s*\\{\\s*\\}"
