id: dart-timer-001
name: Timer without cancel
severity: low
category: config
confidence: low
cwe: CWE-772
languages:
- dart
message: Timer without cancel can cause memory leaks. Cancel timers on dispose.
patterns:
- type: regex
  pattern: Timer\.(periodic|)\s*\([^)]+\)(?!.*cancel)
  where: []
references:
- https://cwe.mitre.org/data/definitions/772.html
