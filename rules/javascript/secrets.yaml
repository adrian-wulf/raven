id: raven-js-secrets-001
name: Hardcoded API Key or Secret
description: |
  Detects hardcoded API keys, secrets, tokens, and passwords in source code.
  AI often generates example credentials that developers forget to remove.
severity: high
category: secrets
confidence: medium
cwe: CWE-798
languages: [javascript, typescript, python, go, php, rust, java]
message: |
  Hardcoded secret detected. Move this to environment variables (e.g., process.env.SECRET_KEY).
patterns:
  - type: regex
    pattern: "(?i)(api[_-]?key|secret[_-]?key|auth[_-]?token|password|private[_-]?key)\\s*[:=]\\s*['\"`][a-zA-Z0-9_\\-\\.]{8,}['\"`]"
  - type: regex
    pattern: "(?i)(AWS_ACCESS_KEY_ID|AWS_SECRET_ACCESS_KEY|GITHUB_TOKEN|OPENAI_API_KEY|STRIPE_KEY)\\s*[:=]\\s*['\"`][^'\"`\\s]+['\"`]"
  - type: regex
    pattern: "(?i)sk-[a-zA-Z0-9_\\-]{20,}"
  - type: regex
    pattern: "(?i)ghp_[a-zA-Z0-9]{36}"
  - type: regex
    pattern: "(?i)Bearer\\s+[a-zA-Z0-9_\\-\\.]{20,}"
references:
  - https://owasp.org/www-community/vulnerabilities/Use_of_hard-coded_password
  - https://docs.github.com/en/code-security/secret-scanning
