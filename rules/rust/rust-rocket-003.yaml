id: rust-rocket-003
name: Rocket Template Injection
description: |
  Detects xss issues in RUST code.
severity: high
category: xss
confidence: high
cwe: CWE-79
languages: [rust]
frameworks: [rocket]
message: |
  Rocket templates rendering user content without escaping enable XSS.
patterns:
  - type: regex
    pattern: '(?i)Template::render\s*\(.*user'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)rocket_dyn_templates.*render\s*\(.*request'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/79.html
