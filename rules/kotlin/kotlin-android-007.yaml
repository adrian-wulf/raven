id: kotlin-android-007
name: Android SharedPreferences Leak
description: |
  Detects information-disclosure issues in KOTLIN code.
severity: medium
category: information-disclosure
confidence: medium
cwe: CWE-312
languages: [kotlin]
frameworks: [android]
message: |
  SharedPreferences without encryption can leak sensitive data.
patterns:
  - type: regex
    pattern: '(?i)getSharedPreferences.*edit\(\).*putString.*password'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)getSharedPreferences.*edit\(\).*putString.*secret'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)getSharedPreferences.*edit\(\).*putString.*token'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/312.html
