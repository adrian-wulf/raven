id: raven-js-clickjack-001
name: Missing Clickjacking Protection
description: |
  Detects missing X-Frame-Options or CSP frame-ancestors headers
  which allow clickjacking attacks.
severity: medium
category: clickjacking
confidence: medium
cwe: CWE-1021
languages: [javascript, typescript, python, go, php]
message: |
  Missing clickjacking protection. Set X-Frame-Options: DENY or
  Content-Security-Policy: frame-ancestors 'none' to prevent your
  site from being embedded in malicious iframes.
patterns:
  - type: regex
    pattern: "app\\.use\\s*\\(\\s*helmet\\s*\\)"
  - type: regex
    pattern: "res\\.setHeader\\s*\\(\\s*['\"]X-Frame-Options['\"]"
references:
  - https://cheatsheetseries.owasp.org/cheatsheets/Clickjacking_Defense_Cheat_Sheet.html
