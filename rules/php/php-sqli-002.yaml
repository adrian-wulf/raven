id: php-sqli-002
name: PDO prepare without Parameter Binding
description: |
  Detects sql-injection issues in PHP code.
severity: high
category: sql-injection
confidence: high
cwe: CWE-89
languages: [php]
message: |
  PDO prepare without binding parameters leaves placeholders empty.
patterns:
  - type: regex
    pattern: '(?i)prepare\s*\(.*[''"].*\?.*[''"]\s*\)(?!.*bindValue)(?!.*execute\s*\(.*\$)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)prepare\s*\(.*[''"].*:.*[''"]\s*\)(?!.*bindParam)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/89.html
