id: java-android-010
name: Android WebView setAllowFileAccess
description: |
  Detects path-traversal issues in JAVA code.
severity: high
category: path-traversal
confidence: high
cwe: CWE-22
languages: [java]
frameworks: [android]
message: |
  setAllowFileAccess(true) allows WebView to access local files. Disable it.
patterns:
  - type: regex
    pattern: '(?i)setAllowFileAccess\s*\(\s*true\s*\)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)setAllowContentAccess\s*\(\s*true\s*\)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)setAllowFileAccessFromFileURLs\s*\(\s*true\s*\)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/22.html
