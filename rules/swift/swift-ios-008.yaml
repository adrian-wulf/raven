id: swift-ios-008
name: Keychain Weak Accessibility
description: |
  Detects weak-cryptography issues in SWIFT code.
severity: high
category: weak-cryptography
confidence: high
cwe: CWE-522
languages: [swift]
frameworks: [ios]
message: |
  Weak keychain accessibility exposes data to unauthorized access.
patterns:
  - type: regex
    pattern: '(?i)kSecAttrAccessibleAlways'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)kSecAttrAccessibleAfterFirstUnlock(?!.*ThisDevice)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/522.html
