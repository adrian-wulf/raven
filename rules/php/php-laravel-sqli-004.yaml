id: php-laravel-sqli-004
name: Laravel Eloquent whereRaw with Request
description: |
  Detects sql-injection issues in PHP code.
severity: critical
category: sql-injection
confidence: high
cwe: CWE-89
languages: [php]
frameworks: [laravel]
message: |
  Never pass user input to whereRaw. Use standard where() with bindings.
patterns:
  - type: regex
    pattern: '(?i)whereRaw\(.*''.*WHERE.*request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)whereRaw\(.*''.*AND.*request'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/89.html
