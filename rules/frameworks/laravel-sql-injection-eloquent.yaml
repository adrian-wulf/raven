id: raven-fw-laravel-007
name: Laravel Eloquent Unsafe Query
severity: critical
category: sql-injection
confidence: high
cwe: CWE-89
languages: [php]
frameworks: [laravel]
message: |
  orderByRaw or groupBy with user input is SQL injection. Use safe methods.
patterns:
  - type: regex
    pattern: "->orderByRaw\\s*\\(\\s*['\"].*\\$"
  - type: regex
    pattern: "->groupByRaw\\s*\\(\\s*['\"].*\\$"
