id: php-symfony-param-001
name: Symfony ParamConverter Injection
description: |
  Detects injection issues in PHP code.
severity: high
category: injection
confidence: high
cwe: CWE-74
languages: [php]
frameworks: [symfony]
message: |
  ParamConverter with user-controlled IDs can access unauthorized entities.
patterns:
  - type: regex
    pattern: '(?i)@ParamConverter\s*\(.*[''"][^''"]+[''"].*[''"][^''"]+[''"]'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)ParamConverter.*request.*id'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/74.html
