id: raven-js-event-001
name: Event Listener XSS via innerHTML
description: |
  Detects setting innerHTML inside event handlers with user-controlled data.
severity: high
category: xss
confidence: high
cwe: CWE-79
languages: [javascript, typescript]
message: |
  innerHTML in event handler with user data is XSS. Use textContent or sanitize.
patterns:
  - type: regex
    pattern: "addEventListener\\s*\\(\\s*['\"]\\w+['\"]\\s*,\\s*\\(\\s*\\)\\s*=>\\s*\\{[^}]*innerHTML"
