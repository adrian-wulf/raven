id: kotlin-android-011
name: Android Exported Receiver
description: |
  Detects intent-injection issues in KOTLIN code.
severity: high
category: intent-injection
confidence: high
cwe: CWE-925
languages: [kotlin]
frameworks: [android]
message: |
  Exported BroadcastReceivers can receive intents from any app.
patterns:
  - type: regex
    pattern: '(?i)android:exported=[''"]true[''"].*<receiver'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)<receiver[^>]*exported=[''"]true[''"]'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/925.html
