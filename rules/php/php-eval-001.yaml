id: php-eval-001
name: eval User Input RCE
description: |
  Detects code-injection issues in PHP code.
severity: critical
category: code-injection
confidence: critical
cwe: CWE-94
languages: [php]
message: |
  eval() with user input allows arbitrary code execution. Never use eval().
patterns:
  - type: regex
    pattern: '(?i)eval\s*\(\s*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)eval\s*\(.*[''"].*\$_(GET|POST|REQUEST)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)eval\s*\(\s*base64_decode'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/94.html
