id: java-xpath-001
name: XPathExpression Query Injection
description: |
  Detects xpath-injection issues in JAVA code.
severity: high
category: xpath-injection
confidence: high
cwe: CWE-643
languages: [java]
message: |
  XPath queries with user input can access unauthorized data. Use parameterized queries.
patterns:
  - type: regex
    pattern: '(?i)XPathFactory\.newInstance.*compile'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)xpathExpression\.evaluate\s*\(.*request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)xpath\.compile\s*\(.*\+.*request'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/643.html
