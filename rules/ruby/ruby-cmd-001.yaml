id: ruby-cmd-001
name: Ruby system Command Injection
description: |
  Detects command-injection issues in RUBY code.
severity: critical
category: command-injection
confidence: critical
cwe: CWE-78
languages: [ruby]
message: |
  system() with user input allows command injection.
patterns:
  - type: regex
    pattern: '(?i)system\s*\(\s*.*params'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)system\s*\(\s*.*[''"].*\#\{'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/78.html
