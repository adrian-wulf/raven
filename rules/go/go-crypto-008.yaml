id: go-crypto-008
name: SHA1 for Security Critical Operations
description: |
  Detects weak-cryptography issues in GO code.
severity: high
category: weak-cryptography
confidence: high
cwe: CWE-328
languages: [go]
message: |
  SHA1 is no longer considered secure. Use SHA-256 or better for security-critical hashing.
patterns:
  - type: regex
    pattern: '(?i)sha1\.Sum\s*\('
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)sha1\.New\s*\(\)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/328.html
