id: csharp-authz-003
name: Policy Bypass
description: |
  Detects broken-authorization issues in CSHARP code.
severity: high
category: broken-authorization
confidence: high
cwe: CWE-285
languages: [csharp]
frameworks: [aspnet]
message: |
  Custom authorization policies must be enforced consistently.
patterns:
  - type: regex
    pattern: '(?i)options\.AddPolicy.*(?!.*RequireRole)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)options\.AddPolicy.*(?!.*RequireClaim)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/285.html
