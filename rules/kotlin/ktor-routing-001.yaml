id: ktor-routing-001
name: Ktor Routing Param Injection
description: |
  Detects injection issues in KOTLIN code.
severity: high
category: injection
confidence: high
cwe: CWE-74
languages: [kotlin]
frameworks: [ktor]
message: |
  Ktor route parameters should be validated.
patterns:
  - type: regex
    pattern: '(?i)get\s*\(\s*[''"].*\{.*\}.*[''"]'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)routing.*param.*(?!.*validate)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/74.html
