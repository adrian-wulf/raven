id: c-inject-002
name: SQLi via ODBC
description: |
  Detects sql-injection issues in C code.
severity: critical
category: sql-injection
confidence: high
cwe: CWE-89
languages: [c]
message: |
  ODBC SQLExecDirect with user input allows SQL injection.
patterns:
  - type: regex
    pattern: '(?i)SQLExecDirect\s*\(.*,\s*.*user'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)SQLPrepare\s*\(.*,\s*.*sprintf'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/89.html
