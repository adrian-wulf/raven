id: swift-kitura-001
name: Kitura Route Injection
description: |
  Detects injection issues in SWIFT code.
severity: high
category: injection
confidence: high
cwe: CWE-74
languages: [swift]
frameworks: [kitura]
message: |
  Kitura route handlers should validate user input.
patterns:
  - type: regex
    pattern: '(?i)router\.get\s*\(\s*[''"].*[''"]\s*\)\s*\{.*request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)router\.post\s*\(\s*[''"].*[''"]\s*\).*parameters'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/74.html
