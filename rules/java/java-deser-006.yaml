id: java-deser-006
name: Fastjson AutoType Enabled
description: |
  Detects insecure-deserialization issues in JAVA code.
severity: critical
category: insecure-deserialization
confidence: critical
cwe: CWE-502
languages: [java]
frameworks: [fastjson]
message: |
  AutoTypeSupport in Fastjson enables arbitrary class instantiation.
patterns:
  - type: regex
    pattern: '(?i)ParserConfig\.getGlobalInstance\(\).*setAutoTypeSupport\s*\(\s*true'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)Feature\.AutoTypeSupport'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/502.html
