id: java-android-009
name: Android ProGuard Rules Leak
description: |
  Detects information-disclosure issues in JAVA code.
severity: medium
category: information-disclosure
confidence: medium
cwe: CWE-200
languages: [java]
frameworks: [android]
message: |
  Overly permissive ProGuard rules can expose internal class names.
patterns:
  - type: regex
    pattern: '(?i)-keep\s+class\s+\*'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)-keepclassmembers\s+class\s+\*'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)-dontobfuscate'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/200.html
