id: raven-iac-tf-004
name: Terraform Hardcoded Password
description: |
  Detects hardcoded passwords in Terraform resource definitions.
severity: high
category: secrets
confidence: high
cwe: CWE-798
languages: [terraform]
message: |
  Hardcoded password detected! Use random_password resource or vault provider.
patterns:
  - type: regex
    pattern: "password\\s*=\\s*\"[^\"]+\""
