id: c-bof-013
name: Heap Buffer Overflow Pattern
description: |
  Detects buffer-overflow issues in C code.
severity: critical
category: buffer-overflow
confidence: high
cwe: CWE-122
languages: [c]
message: |
  Heap buffers with unbounded writes can corrupt heap metadata.
patterns:
  - type: regex
    pattern: '(?i)malloc\s*\(.*\).*strcpy'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)malloc\s*\(.*\).*memcpy'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)realloc\s*\(.*\).*strcpy'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/122.html
