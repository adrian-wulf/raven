id: java-misc-006
name: RMI Registry Binding
description: |
  Detects code-injection issues in JAVA code.
severity: high
category: code-injection
confidence: high
cwe: CWE-94
languages: [java]
message: |
  RMI registry binding of user-controlled objects can lead to deserialization attacks.
patterns:
  - type: regex
    pattern: '(?i)LocateRegistry.*createRegistry'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)registry\.bind\s*\(.*request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)UnicastRemoteObject.*exportObject'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/94.html
