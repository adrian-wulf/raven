id: java-file-001
name: Multipart Upload Path Traversal
description: |
  Detects path-traversal issues in JAVA code.
severity: high
category: path-traversal
confidence: high
cwe: CWE-22
languages: [java]
frameworks: [spring]
message: |
  Uploaded file names can contain path traversal sequences. Sanitize filenames.
patterns:
  - type: regex
    pattern: '(?i)multipartFile\.getOriginalFilename\s*\(\)(?!.*sanitize)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)multipartFile\.transferTo\s*\(.*getOriginalFilename'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)new\s+File\s*\(\s*.*getOriginalFilename\s*\)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/22.html
