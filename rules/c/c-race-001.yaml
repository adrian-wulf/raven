id: c-race-001
name: TOCTOU File Operation
description: |
  Detects race-condition issues in C code.
severity: high
category: race-condition
confidence: high
cwe: CWE-367
languages: [c]
message: |
  Time-of-check to time-of-use race conditions allow file access bypass.
patterns:
  - type: regex
    pattern: '(?i)access\s*\(\s*.*\).*fopen'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)stat\s*\(\s*.*\).*open'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)if\s*\(\s*access\s*\('
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/367.html
