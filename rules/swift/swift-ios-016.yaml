id: swift-ios-016
name: Deeplink Injection
description: |
  Detects url-redirection issues in SWIFT code.
severity: high
category: url-redirection
confidence: high
cwe: CWE-601
languages: [swift]
frameworks: [ios]
message: |
  Deeplinks with user input can redirect to malicious screens.
patterns:
  - type: regex
    pattern: '(?i)application\s*\(\s*.*open\s+url.*options'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)handle.*deeplink.*(?!.*validate)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)scene.*openURLContexts.*(?!.*check)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/601.html
