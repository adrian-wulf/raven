id: swift-ios-017
name: openURL without Validation
description: |
  Detects url-redirection issues in SWIFT code.
severity: high
category: url-redirection
confidence: high
cwe: CWE-601
languages: [swift]
frameworks: [ios]
message: |
  Opening URLs without validation can redirect to phishing sites.
patterns:
  - type: regex
    pattern: '(?i)UIApplication\.shared\.open\s*\(\s*.*url(?!.*validate)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)open\s*\(\s*.*URL\s*\(\s*.*string(?!.*whitelist)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/601.html
