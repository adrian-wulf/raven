id: ktor-routing-002
name: Ktor Request Parameter Trust
description: |
  Detects injection issues in KOTLIN code.
severity: medium
category: injection
confidence: medium
cwe: CWE-74
languages: [kotlin]
frameworks: [ktor]
message: |
  Ktor call parameters from user input need validation.
patterns:
  - type: regex
    pattern: '(?i)call\.parameters\[.*\].*(?!.*validate)'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)call\.request\.queryParameters.*(?!.*check)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/74.html
