id: swift-vapor-005
name: Vapor Request Body Injection
description: |
  Detects injection issues in SWIFT code.
severity: high
category: injection
confidence: high
cwe: CWE-74
languages: [swift]
frameworks: [vapor]
message: |
  Request body content should be validated before processing.
patterns:
  - type: regex
    pattern: '(?i)req\.content\.decode\s*\(\s*.*self'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)req\.body\.string.*(?!.*validate)'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/74.html
