id: js-nextjs-config-001
name: Missing security headers
severity: medium
category: config
confidence: medium
cwe: CWE-693
languages:
- javascript
- typescript
message: next.config without security headers is missing protection. Add CSP, HSTS, X-Frame-Options.
patterns:
- type: regex
  pattern: next\.config\.(js|mjs|ts)\s*.*\n.*(?!headers)(?!Content-Security-Policy)
  where: []
references:
- https://cwe.mitre.org/data/definitions/693.html
frameworks:
- nextjs
