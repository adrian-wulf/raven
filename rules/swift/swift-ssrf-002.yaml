id: swift-ssrf-002
name: Alamofire.request User URL
description: |
  Detects ssrf issues in SWIFT code.
severity: high
category: ssrf
confidence: high
cwe: CWE-918
languages: [swift]
frameworks: [alamofire]
message: |
  Alamofire with user URLs enables SSRF.
patterns:
  - type: regex
    pattern: '(?i)AF\.request\s*\(\s*.*user'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)Alamofire\.request\s*\(\s*.*request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)Session\.default\.request\s*\(\s*.*input'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/918.html
