id: ruby-file-003
name: Pathname User Path
description: |
  Detects path-traversal issues in RUBY code.
severity: medium
category: path-traversal
confidence: medium
cwe: CWE-22
languages: [ruby]
message: |
  Pathname with user input can traverse outside intended directory.
patterns:
  - type: regex
    pattern: '(?i)Pathname\.new\s*\(\s*.*params'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)Pathname\.new\s*\(\s*.*request'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/22.html
