id: bash-ssrf-001
name: curl with user URL
severity: critical
category: ssrf
confidence: high
cwe: CWE-918
languages:
- bash
- shell
message: curl with user-controlled URL enables SSRF. Validate URLs against allowlist.
patterns:
- type: regex
  pattern: curl\s+.*\$?(?P<input>URL|url|user|input)
  where:
  - not-constant: true
references:
- https://cwe.mitre.org/data/definitions/918.html
