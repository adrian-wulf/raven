id: raven-py-secrets-001
name: Hardcoded Secret in Python
description: |
  Detects hardcoded API keys, passwords, secrets, and tokens in Python code.
severity: high
category: secrets
confidence: medium
cwe: CWE-798
languages: [python]
message: |
  Hardcoded secret detected. Move to environment variables,
  python-dotenv, or a secret manager (AWS Secrets Manager, Vault).
patterns:
  - type: regex
    pattern: '(?i)(api[_-]?key|secret[_-]?key|auth[_-]?token|password|private[_-]?key)\s*[:=]\s*["''''][^"'''']{8,}["'''']'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)(AWS_ACCESS_KEY_ID|AWS_SECRET_ACCESS_KEY|GITHUB_TOKEN|OPENAI_API_KEY|STRIPE_KEY|DATABASE_URL)\s*[:=]\s*["''''][^"'''']+["'''']'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)sk-[a-zA-Z0-9_\-]{20,}'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)Bearer\s+[a-zA-Z0-9_\-\.]{20,}'
    where:
      - not-test-file: true
references:
  - https://owasp.org/www-community/vulnerabilities/Use_of_hard-coded_password
