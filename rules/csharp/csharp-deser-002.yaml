id: csharp-deser-002
name: BinaryFormatter Deserialize User Data
description: |
  Detects insecure-deserialization issues in CSHARP code.
severity: critical
category: insecure-deserialization
confidence: critical
cwe: CWE-502
languages: [csharp]
message: |
  Deserializing untrusted data with BinaryFormatter enables RCE.
patterns:
  - type: regex
    pattern: '(?i)Deserialize\s*\(\s*.*Request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)Deserialize\s*\(\s*.*Stream.*user'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)Deserialize\s*\(\s*.*input'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/502.html
