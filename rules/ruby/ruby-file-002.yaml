id: ruby-file-002
name: send_file User Path
description: |
  Detects path-traversal issues in RUBY code.
severity: high
category: path-traversal
confidence: high
cwe: CWE-22
languages: [ruby]
frameworks: [rails]
message: |
  send_file with user-controlled paths serves arbitrary files.
patterns:
  - type: regex
    pattern: '(?i)send_file\s+.*params'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)send_file\s+.*request'
    where:
      - not-test-file: true
  - type: regex
    pattern: '(?i)send_data\s+.*File\.read'
    where:
      - not-test-file: true
references:
  - https://cwe.mitre.org/data/definitions/22.html
